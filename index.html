<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Picture Puzzle — Swap (POC)</title>
<style>
  :root{
    /* dark teal → green page gradient (reference HUD background) */
    --bg-top:#0e4f47; --bg-bottom:#0a2f29;
    --gridline:#0a3a33;             /* dark bg showing through tile gaps */
    --hud-text:#ffffff; --hud-dim:#bfe6dd;
    --accent:#34d399;               /* green accent (gear / next) */
    --badge:#ef4444;                /* hint count badge (red) */
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  /* kill the iOS long-press magnifier/loupe + text selection/copy callout everywhere (user req
     2026-06-30): -webkit-touch-callout:none stops the loupe + "Copy" menu; user-select:none stops
     selection (so no copy toggle on Android either). Applied globally — a puzzle game never needs
     text selection. The game's own touch/drag still works (these don't affect pointer events). */
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;
     -webkit-touch-callout:none; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; }
  img{ -webkit-user-drag:none; user-drag:none; }
  html,body{ height:100%; overflow:hidden; background:var(--bg-bottom);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:none; color:var(--hud-text); }

  /* full-window background fills any letterbox (uniform, no bands) */
  #bg{ position:fixed; inset:0; z-index:0;
    background:linear-gradient(180deg,var(--bg-top) 0%, var(--bg-bottom) 100%); }

  /* fixed portrait design box, centered */
  #stage{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:100vw; height:100vh; height:100dvh;            /* dvh = visible viewport (excludes mobile toolbar → no bottom cut-off) */
    max-width:56.25vh; max-width:56.25dvh; max-height:177.78vw;
    overflow:hidden; z-index:1; display:flex; flex-direction:column;
  }

  /* GAMEREELS: fill the FULL device screen. CRITICAL: use 100vh (STABLE large-viewport), NOT 100dvh —
     iOS recalculates dvh during animations, which re-fits/shifts the board every time → the grid
     "jumps" mid-merge regardless of level/arrangement (the regression vs the old vw-capped layout).
     vh + the vh-based paddings below are all stable, so the board never moves on a dvh recalc. */
  body.gamereels #stage{
    left:0; top:0; transform:none;
    width:100vw; height:100vh;
    max-width:none; max-height:none;
  }
  /* Header (Level# + hint) lower + always the TOP layer (above board/deck/glow) so the gravity deck
     can pass UNDER it. Grid pushed lower by a FIXED top offset, top-anchored (flex-start, NOT
     align-items:center — centering re-anchors the board when iOS recalculates 100dvh mid-animation,
     making the grid jump; flex-start keeps it put). */
  body.gamereels #hud-top{ padding-top: calc(12.5vh + var(--safe-t)); z-index:20; }
  body.gamereels #board-wrap{ align-items:flex-start; padding-top:6vh; }
  /* GRAVITY: float the header (out of flex flow) so the tall deck+play board uses the FULL height;
     the stacked deck may overlap the header — that's fine, the header sits on top (z-index:20). */
  body.gamereels.gravmode #hud-top{ position:absolute; left:0; right:0; top:0; }
  body.gamereels.gravmode #board-wrap{ padding-top:0; }
  /* result screen: lift the Next button well UP from the bottom (user req: "위쪽으로 많이 올려줘") */
  body.gamereels #overlay{ padding-bottom: 26%; }

  /* ── top HUD: gear · Level N · hint bulb (+ badge) ── */
  #hud-top{ position:relative; z-index:5; width:100%; transition:opacity .3s;
    padding:calc(14px + var(--safe-t)) 22px 6px;
    display:flex; align-items:center; justify-content:space-between; }
  .hud-spacer{ width:54px; height:54px; }    /* matches .hud-btn — balances the HUD so the label stays centered */
  .hud-btn{ width:54px; height:54px; border-radius:16px; border:none; cursor:pointer;
    background:#ffffff; display:flex; align-items:center; justify-content:center;
    position:relative; box-shadow:0 4px 10px rgba(0,0,0,.28); }
  .hud-btn svg{ width:30px; height:30px; display:block; }
  .hud-btn .badge{ position:absolute; top:-6px; right:-6px; min-width:22px; height:22px;
    padding:0 5px; border-radius:11px; background:var(--badge); color:#fff;
    font-weight:900; font-size:13px; line-height:22px; text-align:center;
    border:2px solid #0e4f47; }
  /* "buy more hints" state (0 hints): a generated round amber "+" icon, perfectly centered
     (replaces the off-center text "+"). The icon carries its own ring/gloss/shadow. */
  .hud-btn .badge.plus{ background:url(assets/ui/hint_plus.png) center/contain no-repeat;
    border:none; box-shadow:none; color:transparent; text-indent:-9999px;
    padding:0; width:30px; height:30px; min-width:30px; top:-9px; right:-9px; }
  #level-label{ text-align:center; line-height:1.05; }
  #level-label .cap{ font-size:18px; font-weight:800; letter-spacing:.5px; color:var(--hud-dim); }
  #level-label .num{ font-size:34px; font-weight:900; color:var(--hud-text); margin-top:1px;
    text-shadow:0 2px 4px rgba(0,0,0,.35); }

  /* board area fills remaining space; canvas centered square-ish */
  #board-wrap{ position:relative; flex:1 1 auto; min-height:0;
    display:flex; align-items:flex-start; justify-content:center; padding-top:4px; }   /* grid starts right below the HUD (user ref) */
  #board{ display:block; position:relative; z-index:2;
    touch-action:none; -webkit-touch-callout:none; }
  /* the floating (dragged) tile is a separate canvas moved by transform only */
  #drag{ position:absolute; left:0; top:0; z-index:6; pointer-events:none;
    display:none; will-change:transform; }
  /* pop/glow overlay — covers the board-wrap so an enlarging (fused/cleared) block draws ABOVE
     the grid and is NEVER clipped by the board canvas edge (user req: higher layer than grid). */
  #popfx{ position:absolute; left:0; top:0; z-index:5; pointer-events:none; display:block; }

  /* completion result screen: "Congratulations!" ribbon (top) + framed photo + coin & Next (bottom) */
  #overlay{ position:absolute; inset:0; z-index:8; display:none;
    flex-direction:column; align-items:center; justify-content:space-between;
    padding:calc(40px + 8.5% + var(--safe-t)) 0 4%; pointer-events:none; }   /* clears the top-right coin HUD (ribbon sits below it, per ref) */
  /* FLAT "Congratulations!" text (user ref): no 3D/gloss/ribbon — clean bold text, sits near the top */
  #ribbon{ font-size:34px; font-weight:900; font-style:italic; color:#fff; white-space:nowrap;
    text-shadow:0 2px 6px rgba(0,0,0,.35);
    transform:translateY(-44px) scale(.7); opacity:0; }
  /* looping montage of cleared pictures — fills the middle band, never blocks taps */
  #montage{ position:absolute; left:0; right:0; z-index:8; pointer-events:none;
    width:100%; display:none; }
  #result-bottom{ display:flex; flex-direction:column; align-items:center; gap:13px; }
  /* earned-coin pill — ABSOLUTE, JS-placed to STRADDLE the photo's bottom edge (user ref IMG_3302) */
  #reward{ position:absolute; left:0; top:0; z-index:9; transform-origin:center;
    display:flex; align-items:center; gap:7px; font-size:23px; font-weight:900; color:#fff;
    padding:6px 18px; border-radius:22px; background:rgba(0,0,0,.45);
    text-shadow:0 2px 3px rgba(0,0,0,.4); transform:translate(-50%,-100%) scale(.4); opacity:0; }
  #reward .coin{ width:30px; height:30px; display:block;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.45)); }
  /* gold "NEXT" button image — transparent button, image is the content */
  /* FLAT button (user ref): solid amber pill, white text, NO bevel/gloss/gradient/shadow */
  #next-btn{ pointer-events:auto; cursor:pointer; border:none; padding:15px 64px;
    background:#fd9606; color:#fff; font-size:25px; font-weight:900; letter-spacing:.3px;
    border-radius:40px; -webkit-text-stroke:0;
    transform:translateY(18px) scale(.9); opacity:0; }
  #next-btn:active{ transform:scale(.96); opacity:.92; }

  /* the completed photo shrinks into a white frame to make room for the ribbon + reward */
  #board{ transition:transform .45s cubic-bezier(.34,1.35,.5,1); }
  #board.complete{ transform:scale(.74); transform-origin:50% 27%; box-shadow:0 0 0 7px #fff, 0 14px 40px rgba(0,0,0,.42); border-radius:12px; }  /* anchored scale (no translate) so it doesn't appear to "move while zooming" */

  /* confetti canvas overlays the whole stage on completion */
  #confetti{ position:absolute; inset:0; z-index:12; display:none; pointer-events:none; }  /* ABOVE the result overlay (#overlay z8, #reward z9) so confetti rains OVER the congrats screen */

  /* praise pop-text ("Great!" / "Amazing!" …) over the board on good swaps (ref feel) */
  /* praise pop = a generated glossy WORD STICKER (image) over the board on good swaps */
  #praise{ position:absolute; left:50%; top:38%; z-index:9; pointer-events:none;
    width:54%; max-width:260px; height:auto;
    transform:translate(-50%,-50%) scale(.4); opacity:0;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.3)); }

  /* CHEAT MODE — edge arrows (shown only when cheat on) + a brief on/off toast */
  .cheat-arrow{ position:absolute; top:50%; transform:translateY(-50%); z-index:11; display:none;
    width:44px; height:64px; border:none; border-radius:12px; cursor:pointer;
    background:rgba(0,0,0,.42); color:#fff; font-size:34px; font-weight:900; line-height:1;
    align-items:center; justify-content:center; box-shadow:0 3px 10px rgba(0,0,0,.3); }
  .cheat-arrow.on{ display:flex; }
  .cheat-arrow:active{ background:rgba(0,0,0,.6); }
  #cheat-prev{ left:6px; }  #cheat-next{ right:6px; }
  #cheat-toast{ position:absolute; left:50%; top:calc(70px + var(--safe-t)); transform:translateX(-50%);
    z-index:12; background:#fd9606; color:#fff; font-weight:900; font-size:15px; padding:7px 16px;
    border-radius:16px; opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap;
    box-shadow:0 4px 12px rgba(0,0,0,.3); }
  #cheat-toast.show{ opacity:1; }

  /* ── HELD-COIN HUD: dark translucent pill top-right (coin icon + total). Hidden during
       normal play; shown on the result screen and while the hint shop popup is open. ── */
  #coin-hud{ position:absolute; z-index:10; right:18px; top:calc(14px + var(--safe-t));
    display:none; align-items:center; gap:7px;
    padding:6px 16px 6px 9px; border-radius:22px; background:rgba(0,0,0,.34);
    font-size:20px; font-weight:900; color:#fff; pointer-events:none;
    text-shadow:0 2px 3px rgba(0,0,0,.4); }
  #coin-hud img{ width:26px; height:26px; display:block;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.45)); }

  /* ── HINT SHOP popup: dim backdrop + white card (green header pill, red X, blue box +
       green bulb, one green buy pill). Flat style, all CSS/SVG (no new images). ── */
  #hint-shop{ position:fixed; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,.55); }
  #hint-shop.open{ display:flex; }
  .shop-card{ position:relative; width:78%; max-width:300px;
    background:#fff; border-radius:22px; padding:40px 22px 24px;
    box-shadow:0 18px 50px rgba(0,0,0,.4);
    display:flex; flex-direction:column; align-items:center; gap:18px; }
  /* green "Hint" header pill sits ON the card's top edge */
  .shop-head{ position:absolute; top:-22px; left:50%; transform:translateX(-50%);
    background:#37c26a; color:#fff; font-size:22px; font-weight:900;
    padding:10px 40px; border-radius:24px;
    box-shadow:0 6px 14px rgba(0,0,0,.22); white-space:nowrap; }
  /* red circular X close at the card's top-right corner */
  .shop-x{ position:absolute; top:-14px; right:-10px; width:40px; height:40px;
    border:none; border-radius:50%; background:#ef4444; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 5px 12px rgba(0,0,0,.28); pointer-events:auto; }
  .shop-x svg{ width:20px; height:20px; display:block; }
  /* light-blue rounded box holding the big green bulb */
  .shop-box{ width:100%; background:#e7f1fb; border-radius:16px;
    padding:30px 0; display:flex; align-items:center; justify-content:center; }
  .shop-box svg{ width:84px; height:84px; display:block; }
  /* one green buy pill: coin icon + price + "x3" */
  .shop-buy{ width:100%; border:none; cursor:pointer; pointer-events:auto;
    background:#37c26a; color:#fff; border-radius:30px; padding:13px 0;
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-size:23px; font-weight:900;
    box-shadow:0 6px 14px rgba(0,0,0,.18); }
  .shop-buy img{ width:28px; height:28px; display:block; }
  .shop-buy:active{ transform:scale(.97); opacity:.92; }
  .shop-buy.shake{ animation:shopShake .4s; }
  @keyframes shopShake{
    0%,100%{ transform:translateX(0); background:#37c26a; }
    15%{ transform:translateX(-8px); background:#e0533f; }
    30%{ transform:translateX(8px); background:#e0533f; }
    45%{ transform:translateX(-6px); background:#e0533f; }
    60%{ transform:translateX(6px); background:#e0533f; }
    75%{ transform:translateX(-3px); }
  }
  /* ── REELS LEAN MODE (user req 2026-06-30): in the GameReels build, HIDE the currency + item
     meta-UI (coins, +coin reward, hint button + hint shop). HIDDEN, not deleted — reversible by
     removing the `reels-lean` body class (see REELS_HIDE_META in the script). Level label + win
     banner + Next stay. `!important` beats the inline display/visibility the JS sets. ── */
  body.reels-lean #coin-hud,
  body.reels-lean #reward,
  body.reels-lean #hint-shop{ display:none !important; }
  body.reels-lean #btn-hint{ visibility:hidden !important; pointer-events:none !important; }

  /* ── STAGE-1 ONBOARDING TUTORIAL (first play only, gated by localStorage 'pp_tut_s1').
     A non-blocking overlay (pointer-events:none everywhere) so the player drags FREELY:
       #pp-tut-ring  — pulsing yellow highlight over the source-cell rect (JS sets its rect)
       #pp-tut-hand  — pointing hand looping a press→drag→release from src-center → home-center
                       (path driven by JS-set CSS vars --x0/--y0/--x1/--y1)
       #pp-tut-text  — bottom-centered instruction text (and the centered goal/done text)
     Works in BOTH builds; the reels-lean class above only hides the hint button, not this. ── */
  #pp-tut{ position:absolute; inset:0; pointer-events:none; z-index:13; display:none; }
  #pp-tut.on{ display:block; }
  #pp-tut *{ pointer-events:none; }
  #pp-tut-ring{ position:absolute; left:0; top:0; width:0; height:0; border-radius:14px;
    box-shadow:0 0 0 3px rgba(255,214,64,.95), 0 0 18px 4px rgba(255,214,64,.55);
    background:rgba(255,214,64,.10); opacity:0; transform-origin:center;
    transition:opacity .25s; will-change:transform,opacity; }
  #pp-tut-ring.show{ opacity:1; animation:tutRingPulse 1.25s ease-in-out infinite; }
  @keyframes tutRingPulse{ 0%,100%{ transform:scale(1); }   50%{ transform:scale(1.06); } }
  #pp-tut-hand{ position:absolute; left:0; top:0; width:54px; height:auto; opacity:0;
    /* anchor the fingertip (near top of the sprite) to the drag point */
    margin-left:-15px; margin-top:-6px;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.45)); will-change:transform,opacity; }
  #pp-tut-hand.show{ opacity:1; animation:tutHand 2.0s cubic-bezier(.45,.05,.55,.95) infinite; }
  /* press at src → drag to home → release → fade-reset back to src */
  @keyframes tutHand{
    0%   { transform:translate(var(--x0),var(--y0)) scale(1);   opacity:0; }
    8%   { transform:translate(var(--x0),var(--y0)) scale(1);   opacity:1; }
    18%  { transform:translate(var(--x0),var(--y0)) scale(.82);  opacity:1; }   /* press */
    65%  { transform:translate(var(--x1),var(--y1)) scale(.82);  opacity:1; }   /* drag */
    78%  { transform:translate(var(--x1),var(--y1)) scale(1);    opacity:1; }   /* release */
    90%  { transform:translate(var(--x1),var(--y1)) scale(1);    opacity:0; }
    100% { transform:translate(var(--x0),var(--y0)) scale(1);    opacity:0; }
  }
  #pp-tut-text{ position:absolute; left:50%; bottom:7%; transform:translateX(-50%);
    max-width:84%; text-align:center; color:#fff; font-weight:800; font-size:21px;
    line-height:1.4; text-shadow:0 2px 8px rgba(0,0,0,.6), 0 0 2px rgba(0,0,0,.5);
    opacity:0; transition:opacity .3s; }
  #pp-tut-text.show{ opacity:1; }
  /* centered variant for the goal ("complete the picture") + done message */
  #pp-tut-text.center{ bottom:auto; top:50%; transform:translate(-50%,-50%);
    font-size:24px; background:rgba(0,0,0,.32); padding:18px 22px; border-radius:18px;
    backdrop-filter:blur(2px); }
</style>
<script>
/* belt-and-suspenders for the long-press magnifier / text-copy callout (user req 2026-06-30):
   the CSS (-webkit-touch-callout/user-select:none) handles iOS; this blocks the context menu
   (Android long-press / desktop right-click) + image/selection drag. Does NOT touch pointer/
   touch events, so the game's drag still works. */
(function(){ var stop=function(e){ e.preventDefault(); };
  document.addEventListener('contextmenu', stop, {passive:false});
  document.addEventListener('selectstart', stop, {passive:false});
  document.addEventListener('dragstart', stop, {passive:false}); })();
</script>
</head>
<body>
  <div id="bg"></div>
  <div id="stage">
    <!-- held-coin HUD: dark pill top-right (coin + total). Shown on result + hint shop. -->
    <div id="coin-hud"><img src="assets/sprites/ui_coin.webp" alt="coin" /><span id="coin-total">0</span></div>
    <div id="hud-top">
      <div class="hud-spacer" aria-hidden="true"></div>   <!-- settings button removed (user req); spacer keeps the label centered -->
      <div id="level-label">
        <div class="cap">Level</div>
        <div class="num" id="level-num">1</div>
      </div>
      <button class="hud-btn" id="btn-hint" aria-label="hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="#16a06f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18h6"/><path d="M10 21h4"/>
          <path d="M12 3a6 6 0 0 0-4 10.5c.8.8 1.3 1.6 1.5 2.5h5c.2-.9.7-1.7 1.5-2.5A6 6 0 0 0 12 3z"/>
        </svg>
        <span class="badge" id="hint-badge">3</span>
      </button>
    </div>
    <div id="board-wrap">
      <canvas id="board"></canvas>
      <canvas id="popfx"></canvas>
      <canvas id="drag"></canvas>
      <canvas id="confetti"></canvas>
      <img id="praise" alt="" />
    </div>
    <!-- result overlay covers the WHOLE stage so the banner sits near the top (HUD is hidden on win) -->
    <div id="overlay">
      <div id="ribbon">Congratulations!</div>
      <canvas id="montage"></canvas>
      <div id="reward"><img class="coin" src="assets/sprites/ui_coin.webp" alt="coin" />+50</div>
      <div id="result-bottom">
        <button id="next-btn">Next</button>
      </div>
    </div>
    <!-- CHEAT MODE (dev, play-link only): triple-click the Stage label to toggle; ◀▶ jump stages -->
    <button id="cheat-prev" class="cheat-arrow" aria-label="prev stage">‹</button>
    <button id="cheat-next" class="cheat-arrow" aria-label="next stage">›</button>
    <div id="cheat-toast"></div>
    <!-- STAGE-1 ONBOARDING TUTORIAL overlay (non-blocking; shown via .on, see #pp-tut CSS) -->
    <div id="pp-tut">
      <div id="pp-tut-ring"></div>
      <img id="pp-tut-hand" src="assets/sprites/ui_hand.webp" alt="" />
      <div id="pp-tut-text"></div>
    </div>
  </div>

  <!-- HINT SHOP popup — fixed to the VIEWPORT (not the transform-centered #stage) so the dim
       covers full screen on any aspect (L33). Buy 3 hints for 900 coins. No ad button. -->
  <div id="hint-shop">
    <div class="shop-card">
      <div class="shop-head">Hint</div>
      <button class="shop-x" id="shop-close" aria-label="close">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
      <div class="shop-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="#37c26a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18h6"/><path d="M10 21h4"/>
          <path d="M12 3a6 6 0 0 0-4 10.5c.8.8 1.3 1.6 1.5 2.5h5c.2-.9.7-1.7 1.5-2.5A6 6 0 0 0 12 3z"/>
        </svg>
      </div>
      <button class="shop-buy" id="shop-buy">
        <img src="assets/sprites/ui_coin.webp" alt="coin" /><span>900</span>&nbsp;x3
      </button>
    </div>
  </div>

<script type="module">
import { GR, haptic, RT } from './engine/hostbridge.js?v=20260701111159';

// ════════════════════════════════════════════════════════════════════════════
// MODE FLAG — read ONCE at boot. `?mode=gravity` (or window.__MODE==='gravity')
// activates the additive "gravity multi-picture" mode. Default (no flag) is the
// existing single-picture JIGSAW FUSE mode, byte-for-byte unchanged. The flag only
// gates which board-setup / bond-rule / completion path runs; the rendering, drag,
// fuse-bond animation, SFX, glow, confetti and result screen are all SHARED.
// ════════════════════════════════════════════════════════════════════════════
// STAGE FLOW (play link): Stage 1 = single-picture jigsaw, Stage 2 = multi-picture (gravity).
// `?stage=1|2` selects it (`?mode=gravity` kept as a stage-2 alias). The reels build is
// host-driven (window.__GAMEREELS) with no ?stage → it stays Stage 1 / single, unchanged.
const MAX_LEVEL = 100;            // total levels in the standalone progression
const GRAV_POOL_SIZE = 60;       // # of distinct gravity-mode photos (USER REQ 2026-06-27 option B)
const STAGE = (function(){
  try {
    const q = new URLSearchParams(location.search);
    const s = parseInt(q.get('stage'), 10);
    if (Number.isFinite(s) && s >= 1) return Math.min(MAX_LEVEL, s);
  } catch (e) {}
  return 1;
})();

// ════════════════════════════════════════════════════════════════════════════
// 100-LEVEL TABLE — DATA-DRIVEN (simo SKILL-level-balancing). Two modes mixed
// IRREGULARLY (USER REQ 2026-06-27): the single-picture BASE mode dominates (~86%);
// the multi-picture "gravity" mode appears OCCASIONALLY at the hand-picked irregular

      arr.push({ mode: 'gravity', deckPics, poolStart: gc });

// ── SFX (Web Audio). On the reels build the clips are inlined as data URIs via window.__SFX
// (zero external requests); on dev/web they load from assets/audio/. Eager-init at boot (autoplay
// webviews allow it); resume() on the first gesture is the safety net for stricter browsers. Loading
// via fetch+decodeAudioData (NOT `new Audio()`) so the inline-asset path needs no Audio() shim. ──
const SFX_SRCS = (typeof window !== 'undefined' && window.__SFX) ? window.__SFX : {

      // AudioContext (silent-switch, calls, idle). Keep it alive + resume aggressively so SFX never drop.
      const wake = () => { try { if (ctx && ctx.state !== 'running') ctx.resume(); } catch (e) {} };
      ['pointerdown','touchstart','touchend','click','keydown'].forEach((ev) => window.addEventListener(ev, wake, { passive: true, capture: true }));
      document.addEventListener('visibilitychange', () => { if (!document.hidden) wake(); });
      window.addEventListener('focus', wake); window.addEventListener('pageshow', wake);

          .then(a => new Promise((res, rej) => ctx.decodeAudioData(a, res, rej)))   // callback form: old WebKit safe

// ════════════════════════════════════════════════════════════════════════════
// ORIGINAL procedural placeholder picture (NOT the reference desert).
// A soft gradient sky over layered rolling hills + a sun + a couple of clouds —
// enough structure that any misplaced tile is visibly wrong. Drawn once to an
// offscreen canvas; tiles are source-rect slices of this via drawImage.
// ════════════════════════════════════════════════════════════════════════════
function buildPuzzleImage(variant){
  const S = CFG.PUZZLE_RES;
  const W = S, H = Math.round(S / CFG.BOARD_ASPECT);   // PORTRAIT placeholder (matches board aspect)
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  g.scale(W / S, H / S);                                // draw the S-unit scene into the portrait canvas

  // palette varies per level so successive "levels" look distinct
  const PAL = [
    { skyTop:'#ffd59e', skyBot:'#ff9aa8', sun:'#fff3c4', hills:['#7b4ea0','#9a5fae','#c06fae','#e58fa0'] },
    { skyTop:'#a8e6ff', skyBot:'#dff6e0', sun:'#fffae0', hills:['#2e8b6f','#3fae84','#7cc88f','#bfe3a0'] },
    { skyTop:'#fce3a0', skyBot:'#a7d8ff', sun:'#fff7d0', hills:['#3a6ea5','#4f8fc0','#7bb6d6','#a9d8e6'] },
    { skyTop:'#c4b5fd', skyBot:'#fbcfe8', sun:'#fff0f8', hills:['#6d28d9','#8b5cf6','#c084fc','#f0abfc'] },
  ];
  const p = PAL[((variant|0) % PAL.length + PAL.length) % PAL.length];

  // sky gradient
  const sky = g.createLinearGradient(0,0,0,S);
  sky.addColorStop(0, p.skyTop); sky.addColorStop(1, p.skyBot);
  g.fillStyle = sky; g.fillRect(0,0,S,S);

  // sun — offset so it lands in a specific tile region (asymmetry helps "wrongness")
  const sx = S*0.70, sy = S*0.26, sr = S*0.12;
  const glow = g.createRadialGradient(sx,sy,sr*0.2, sx,sy,sr*2.4);
  glow.addColorStop(0, p.sun); glow.addColorStop(0.35, p.sun);
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = glow; g.beginPath(); g.arc(sx,sy,sr*2.4,0,Math.PI*2); g.fill();
  g.fillStyle = p.sun; g.beginPath(); g.arc(sx,sy,sr,0,Math.PI*2); g.fill();

  // a couple of simple clouds (different positions = directional)
  g.fillStyle = 'rgba(255,255,255,0.85)';
  drawCloud(g, S*0.22, S*0.18, S*0.10);
  drawCloud(g, S*0.48, S*0.36, S*0.07);

  // layered rolling hills (back → front), each a smooth sine ridge
  const layers = p.hills;
  for (let i=0;i<layers.length;i++){
    const baseY = S*(0.50 + i*0.13);
    const amp   = S*(0.05 + i*0.012);
    const phase = (i*1.7) + (variant*0.6);
    const freq  = 1.4 + i*0.5;
    g.fillStyle = layers[i];
    g.beginPath(); g.moveTo(0, S);
    g.lineTo(0, baseY + Math.sin(phase)*amp);
    for (let x=0;x<=S;x+=8){
      const y = baseY + Math.sin((x/S)*Math.PI*freq + phase)*amp;
      g.lineTo(x, y);
    }
    g.lineTo(S, S); g.closePath(); g.fill();
  }

  // a lone tree silhouette on the front hill (a clear landmark → strong wrongness cue)
  const tx = S*0.30, tBase = S*0.86;
  g.strokeStyle = 'rgba(40,20,30,0.55)'; g.lineWidth = S*0.012; g.lineCap='round';
  g.beginPath(); g.moveTo(tx, tBase); g.lineTo(tx, tBase - S*0.14); g.stroke();
  g.fillStyle = 'rgba(30,70,40,0.85)';
  g.beginPath(); g.arc(tx, tBase - S*0.18, S*0.055, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(tx - S*0.04, tBase - S*0.13, S*0.04, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(tx + S*0.04, tBase - S*0.13, S*0.04, 0, Math.PI*2); g.fill();

  c.__procedural = true;   // marks the placeholder so a real photo can swap in once it loads
  return c;
}
function drawCloud(g, x, y, r){
  g.beginPath();
  g.arc(x, y, r, 0, Math.PI*2);
  g.arc(x + r*0.9, y + r*0.15, r*0.75, 0, Math.PI*2);
  g.arc(x - r*0.9, y + r*0.2, r*0.7, 0, Math.PI*2);
  g.arc(x + r*0.2, y + r*0.45, r*0.85, 0, Math.PI*2);
  g.fill();
}

// ORIGINAL card-back (face-down): solid rounded blue card, faint dot texture,
// centered floral-ish emblem. Drawn once to an offscreen canvas (reused for all tiles).
// ════════════════════════════════════════════════════════════════════════════
function buildCardBack(w, h){
  const c = document.createElement('canvas'); c.width = Math.max(2,Math.round(w)); c.height = Math.max(2,Math.round(h));
  const g = c.getContext('2d');
  // base blue gradient
  const grad = g.createLinearGradient(0,0,0,c.height);
  grad.addColorStop(0,'#3f86f0'); grad.addColorStop(1,'#2f6fe0');
  g.fillStyle = grad; g.fillRect(0,0,c.width,c.height);
  // argyle / diamond lattice (reference card pattern): crossing diagonals + dots at the nodes
  g.strokeStyle = 'rgba(255,255,255,0.12)';
  g.lineWidth = Math.max(1, c.width*0.010);
  const d = Math.max(18, Math.round(c.width*0.34));        // diamond pitch
  for (let i=-c.height; i<c.width+c.height; i+=d){
    g.beginPath(); g.moveTo(i, 0); g.lineTo(i + c.height, c.height); g.stroke();   // ╲
    g.beginPath(); g.moveTo(i, 0); g.lineTo(i - c.height, c.height); g.stroke();   // ╱
  }
  g.fillStyle = 'rgba(255,255,255,0.10)';
  for (let y=0; y<=c.height; y+=d) for (let x=0; x<=c.width; x+=d){
    g.beginPath(); g.arc(x, y, Math.max(1.5, c.width*0.018), 0, Math.PI*2); g.fill();
  }
  // centered emblem (faint, lighter blue) — original 6-petal floret
  const cx=c.width/2, cy=c.height/2, er=Math.min(c.width,c.height)*0.20;
  g.save(); g.translate(cx,cy);
  g.strokeStyle='rgba(255,255,255,0.22)'; g.lineWidth=Math.max(2, er*0.10);
  g.beginPath(); g.arc(0,0, er*1.25, 0, Math.PI*2); g.stroke();
  g.fillStyle='rgba(255,255,255,0.18)';
  for (let k=0;k<6;k++){
    g.save(); g.rotate(k*Math.PI/3);
    g.beginPath(); g.ellipse(0, -er*0.7, er*0.28, er*0.55, 0, 0, Math.PI*2); g.fill();
    g.restore();
  }
  g.fillStyle='rgba(255,255,255,0.30)';
  g.beginPath(); g.arc(0,0, er*0.3, 0, Math.PI*2); g.fill();
  g.restore();
  return c;
}

// ════════════════════════════════════════════════════════════════════════════
// GAME STATE
// tile.home  = correct cell index (0..N-1, row-major)   ── piece id === home cell
// cell[ci]   = tile occupying cell ci  (the board state)
// completion = every cell ci holds the tile whose home === ci
//
// FUSE MECHANIC: two pieces in adjacent cells are "bonded" iff they are
// solution-neighbors in the correct relative orientation (their home cells are
// the same kind of neighbor as their current cells). A GROUP is a 4-connected
// component of bonded pieces. Dragging grabs the whole group; a drop block-swaps
// the group into place (displaced pieces shift the opposite way). New bonds play a
// border-merge animation (per-edge bond progress 0→1) so a fused group renders as
// one seamless rounded card. Bonds are DERIVED (recomputed every move), never stored.
// ════════════════════════════════════════════════════════════════════════════

let DPR = Math.min(2.5, window.devicePixelRatio || 1);

const State = {
  cols: CFG.GRID.cols, rows: CFG.GRID.rows,
  N: CFG.GRID.cols * CFG.GRID.rows,
  level: 1,                  // 1-based level
  hints: 3,                  // hint charges this level
  seed: 1,
  puzzleImg: null,           // offscreen procedural picture
  cardBack: null,            // offscreen face-down card
  boardW: 0, boardH: 0,      // board pixel size (PORTRAIT, @DPR)
  tileW: 0, tileH: 0,        // tile content size (px @DPR) — tiles are FLUSH (gap=0)
  gap: 0, radius: 0,         // current gap (always 0) / radius (@DPR) — radius shrinks to 0 on complete
  cell: [],                  // cell[ci] = tile index occupying cell ci
  tiles: [],                 // tiles[ti] = { home, faceUp, reveal }
  phase: 'boot',             // boot | deal | reveal | play | swapping | complete
  anims: [],                 // active per-tile anims (deal/reveal/swap/return/bounce)
  dragging: null,            // { group:[cells], originCell, ... } while a group is held
  gridConverge: 0,           // 0..1 — gaps shrink as this → 1 (completion)
  pad: 0,                    // GRAVITY: canvas headroom (px @DPR) AROUND the grid so a clear/merge
                             // pop can grow IN PLACE and spill past the grid without being clipped
                             // by the canvas edge. cellXY/deckCellXY offset the grid by this. 0 = single mode.
  fx: null,                  // active fuse-emphasis outline glow {cells,glow,scale,pivot} or null
  // FUSE: per-cell-edge bond progress (0=loose seam, 1=fully merged/seamless).
  // bondH[ci] = progress of the seam to the RIGHT of cell ci (with cell ci+1).
  // bondV[ci] = progress of the seam BELOW cell ci (with cell ci+cols).
  bondH: [],
  bondV: [],
  // ── GRAVITY MODE state (unused in single mode) ──
  picImg: [],                // picImg[picId] = decoded <img> for that picture (or null)
  picSrcIdx: [],             // picSrcIdx[picId] = index into PUZZLE_SRCS the picture uses
  deck: [],                  // deck[col] = array of QUEUED tile objects, TOP of stack last (next to feed = pop())
  clearedPics: 0,            // pictures cleared this board
  clearedList: [],           // picIds cleared this stage (in clear order) → result-screen montage
  totalPics: 0,              // total pictures in this board (play + deck)
  busy: false,               // gravity/clear/feed sequence in progress → block input
};

// ════════════════════════════════════════════════════════════════════════════
// BOND / GROUP DERIVATION (4-connectivity). Recomputed on demand — never stored.
// A piece's id === its home cell, so cell[ci] IS the home index of the piece there.
// ════════════════════════════════════════════════════════════════════════════
const homeRowOf = (h) => (h / State.cols) | 0;
const homeColOf = (h) => h % State.cols;
// gravity tile model: tile.sub 0=TL,1=TR,2=BL,3=BR → subCol=sub%2, subRow=(sub>>1).
const subColOf = (s) => s % 2;
const subRowOf = (s) => s >> 1;
// horizontal seam: cb (= cell to the RIGHT of ca) bonded to ca iff their homes are
// also right-neighbors in the home grid (same home row, home col +1).
// GRAVITY: bond iff SAME picId, equal subRow, and subCol(a)+1===subCol(b).
function bondedRight(ca, cb){
  if (IS_GRAVITY){
    const ta = State.cell[ca], tb = State.cell[cb];
    if (ta == null || tb == null) return false;
    const A = State.tiles[ta], B = State.tiles[tb];
    if (A.picId !== B.picId) return false;
    return subRowOf(A.sub) === subRowOf(B.sub) && subColOf(A.sub) + 1 === subColOf(B.sub);
  }
  const ha = State.cell[ca], hb = State.cell[cb];
  if (ha == null || hb == null) return false;
  return homeRowOf(hb) === homeRowOf(ha) && homeColOf(hb) === homeColOf(ha) + 1;
}
// vertical seam: cb (= cell BELOW ca) bonded to ca iff homes are also below-neighbors.
// GRAVITY: bond iff SAME picId, equal subCol, and subRow(a)+1===subRow(b).
function bondedBelow(ca, cb){
  if (IS_GRAVITY){
    const ta = State.cell[ca], tb = State.cell[cb];
    if (ta == null || tb == null) return false;
    const A = State.tiles[ta], B = State.tiles[tb];
    if (A.picId !== B.picId) return false;
    return subColOf(A.sub) === subColOf(B.sub) && subRowOf(A.sub) + 1 === subRowOf(B.sub);
  }
  const ha = State.cell[ca], hb = State.cell[cb];
  if (ha == null || hb == null) return false;
  return homeColOf(hb) === homeColOf(ha) && homeRowOf(hb) === homeRowOf(ha) + 1;
}
// the set of bonded seams for the CURRENT board: returns {H:Set(ci), V:Set(ci)}
// where H has ci iff the seam to ci's right is bonded; V has ci iff the seam below is.
function computeBondSeams(){
  const H = new Set(), V = new Set();
  for (let ci=0; ci<State.N; ci++){
    const col = ci % State.cols, row = (ci / State.cols) | 0;
    if (col < State.cols - 1 && bondedRight(ci, ci+1)) H.add(ci);
    if (row < State.rows - 1 && bondedBelow(ci, ci+State.cols)) V.add(ci);
  }
  return { H, V };
}
// bonded PIECE-PAIRS (by tile id, not cell). Used to detect a GENUINELY new bond: moving a
// fused group shifts its seams to new CELLS (so a cell-based diff falsely reads "new"), but the
// PIECE-PAIRS are unchanged — only a real new connection adds a new pair.
function pairKey(a, b){ return a < b ? a + '-' + b : b + '-' + a; }
function computeBondPairs(){
  const s = new Set(), seams = computeBondSeams();
  for (const ci of seams.H) s.add(pairKey(State.cell[ci], State.cell[ci+1]));
  for (const ci of seams.V) s.add(pairKey(State.cell[ci], State.cell[ci+State.cols]));
  return s;
}
// number of bonded seams currently on the board
function bondCount(){ const s = computeBondSeams(); return s.H.size + s.V.size; }
// total possible seams when fully solved (every internal edge bonded)
function maxSeams(){ return State.cols*(State.rows-1) + State.rows*(State.cols-1); }
// BFS the 4-connected group of bonded pieces containing cell ci → array of cells.
function groupCellsOf(ci){
  if (State.cell[ci] == null) return [];
  const seen = new Set([ci]); const stack = [ci]; const out = [];
  while (stack.length){
    const c = stack.pop(); out.push(c);
    const col = c % State.cols, row = (c / State.cols) | 0;
    const tryAdd = (nc) => { if (nc != null && !seen.has(nc)){ seen.add(nc); stack.push(nc); } };
    // left/right/up/down — bonded if the seam between is bonded
    if (col > 0            && bondedRight(c-1, c)) tryAdd(c-1);
    if (col < State.cols-1 && bondedRight(c, c+1)) tryAdd(c+1);
    if (row > 0            && bondedBelow(c-State.cols, c)) tryAdd(c-State.cols);
    if (row < State.rows-1 && bondedBelow(c, c+State.cols)) tryAdd(c+State.cols);
  }
  return out.sort((a,b)=>a-b);
}

// ── layout: size the board as a centered PORTRAIT rect (BOARD_ASPECT), picture fills it ──
// GRAVITY: the board canvas spans the DECK rows (top) + PLAY rows (below); tiles are
// SQUARE. The play grid (State.cell) is COLS×PLAY_ROWS; the deck is drawn above it and
// is NOT part of the swap grid. State.deckOffY = pixel Y of play row 0 (= deck height).
function layout(){
  const wrap = document.getElementById('board-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  DPR = Math.min(2.5, window.devicePixelRatio || 1);

  const margin = 6;
  // GRAVITY: small reserve so the board nearly FILLS the screen (just off the bottom edge),
  // sitting close under the HUD (centering splits this into a small top + bottom gap).
  const gravReserve = IS_GRAVITY ? Math.round(H * 0.05) : 0;
  // GRAVITY board aspect for PORTRAIT tiles: boardW/boardH = COLS / (TILE_RATIO * totalRows)
  const aspect = IS_GRAVITY ? (GRAV.COLS / (GRAV.TILE_RATIO * (GRAV.DECK_ROWS + GRAV.PLAY_ROWS))) : CFG.BOARD_ASPECT;
  const fit = (aw, ah) => { let w = Math.max(40, aw), h = Math.max(40, ah);
    if (w / h > aspect) w = h * aspect; else h = w / aspect; return { w, h }; };
  // Reference-like side breathing room so the board is NOT edge-to-edge (user req: roomy L/R margins).
  // The board canvas == the grid (no headroom): an enlarging fused/cleared block is drawn on the
  // #popfx overlay (above the grid, covering the wrap) so it overflows the grid WITHOUT being clipped.
  const sideR = Math.round(W * 0.02);   // near edge-to-edge (user ref: grid fills the width)
  const g = fit(W - margin*2 - sideR*2, H - margin*2 - gravReserve);
  const bw = g.w, bh = g.h;

  const gw = Math.round(bw * DPR), gh = Math.round(bh * DPR);
  boardCanvas.width  = gw;
  boardCanvas.height = gh;
  boardCanvas.style.width  = bw + 'px';
  boardCanvas.style.height = bh + 'px';

  State.boardW = gw;                                      // GRID raster dims (tileW/tileH derive from these)
  State.boardH = gh;
  State.pad = 0;                                          // retired — the #popfx overlay handles edge-overflow

  if (IS_GRAVITY){
    const allRows = GRAV.DECK_ROWS + GRAV.PLAY_ROWS;
    const unit = State.boardW / State.cols;                                     // gap scales with tile WIDTH
    State.gap     = Math.round(unit * CFG.GAP_FRAC);                            // never converges (no whole-board seal)
    State.gapY    = State.gap;                                                  // gravity: square gaps (no seal → no warp path)
    State.radius  = Math.round(unit * CFG.RADIUS_FRAC);
    State.tileW = (State.boardW - (State.cols - 1) * State.gap) / State.cols;
    State.tileH = (State.boardH - (allRows - 1) * State.gap) / allRows;        // PORTRAIT (tileH ≈ TILE_RATIO·tileW via aspect)
    State.deckOffY = GRAV.DECK_ROWS * (State.tileH + State.gap);               // play row 0 sits below the deck
  } else {
    // small inter-tile gap + rounded corners, proportional to tile size (both → 0 on completion).
    const unit = Math.min(State.boardW / State.cols, State.boardH / State.rows);  // tile short side
    const gBase = unit * CFG.GAP_FRAC * (1 - State.gridConverge);
    // PROPORTIONAL gaps (fix 2026-07-01, "완성 순간 그림이 살짝 일그러짐"): choose gapX/gapY so that
    // (cols-1)·gapX/boardW == (rows-1)·gapY/boardH. That keeps tileW/tileH == the photo aspect for
    // EVERY gridConverge, so the photo scales UNIFORMLY as the board seals (no aspect drift = no warp).
    // Centered on the old square gap (geometric mean) to stay visually near-identical; gaps come out
    // exactly square whenever cols/rows already matches the board aspect (e.g. 3×4 on a 2:3 board).
    setProportionalGaps(gBase);
    State.radius  = Math.round(unit * CFG.RADIUS_FRAC * (1 - State.gridConverge));
    State.deckOffY = 0;
  }

  // confetti canvas matches the stage box
  const stage = document.getElementById('stage');
  confettiCanvas.width  = Math.round(stage.clientWidth * DPR);
  confettiCanvas.height = Math.round(stage.clientHeight * DPR);
  confettiCanvas.style.width = stage.clientWidth + 'px';
  confettiCanvas.style.height = stage.clientHeight + 'px';

  // pop overlay covers the whole board-wrap (full width incl. the side margins) so an enlarging
  // block can spill past the grid into the margin without being clipped. fxOff = the board's
  // top-left within the wrap (board is flex-centered) → maps board-local cellXY coords onto popfx.
  popfxCanvas.width  = Math.round(W * DPR);
  popfxCanvas.height = Math.round(H * DPR);
  popfxCanvas.style.width = W + 'px';
  popfxCanvas.style.height = H + 'px';
  refreshFxOff();

  drawBoard();
}

// Recompute the #popfx overlay origin = the board's top-left within the wrap (in popfx backing px).
// MUST be live, not a one-time layout() snapshot: on the FIRST stage ENTERED in a session the board's
// position within the wrap can still SHIFT after that first layout() (late HUD height / safe-area inset
// / host adjustment settling), which left fxOff stale → the place/merge VISUALS (drawn on #popfx) were
// subtly offset on that first-entered stage while the drop LOGIC (toLocal, already live) stayed correct.
// Stage 2+ re-ran layout() post-settle so they were fine — exactly the reported symptom. Recomputing
// here every time we draw an fx (cheap; only runs while a glow/pop is on screen) self-corrects any
// staleness, the same live-rect philosophy as toLocal/cellCenter. The /zf cancels uniform host scale.
function refreshFxOff(){
  const wrap = document.getElementById('board-wrap');
  if (!wrap || !boardCanvas) return;
  const wr = wrap.getBoundingClientRect(), br = boardCanvas.getBoundingClientRect();
  const zf = br.width / (parseFloat(boardCanvas.style.width) || br.width) || 1;
  State.fxOffX = Math.round((br.left - wr.left) / zf * DPR);
  State.fxOffY = Math.round((br.top  - wr.top ) / zf * DPR);
}

// SINGLE mode: set gapX (State.gap) + gapY (State.gapY) from a base gap so the horizontal/vertical
// gaps stay in the ratio that keeps tileW/tileH == the photo aspect (uniform photo scale = no
// completion warp). gapY/gapX = boardH·(cols-1) / (boardW·(rows-1)); centered on gBase via its sqrt.
function setProportionalGaps(gBase){
  const denom = State.boardW * (State.rows - 1);
  const R = denom > 0 ? (State.boardH * (State.cols - 1)) / denom : 1;   // = gapY/gapX for no warp
  const rs = Math.sqrt(R > 0 ? R : 1);
  // keep gaps as FLOATS (do NOT round independently — that skews the gapX:gapY ratio and reintroduces
  // a residual aspect drift). cellXY integer-snaps the tile POSITIONS, so crisp gridlines are kept.
  State.gap  = gBase / rs;                                               // gapX — column spacing
  State.gapY = gBase * rs;                                               // gapY — row spacing
  State.tileW = (State.boardW - (State.cols - 1) * State.gap)  / State.cols;
  State.tileH = (State.boardH - (State.rows - 1) * State.gapY) / State.rows;
}

// cell index → INTEGER-snapped rect (@DPR, board-local), gap-aware. Tiles are rounded
// cards separated by State.gap (the small teal gridline); integer rounding keeps edges crisp.
// GRAVITY: play cells are offset down by State.deckOffY so the deck sits above them.
function cellXY(ci){
  const col = ci % State.cols, row = (ci / State.cols) | 0;
  const pad = State.pad || 0;                                   // grid is inset by the canvas headroom (GRAVITY)
  const x = pad + Math.round(col * (State.tileW + State.gap));
  const y = pad + Math.round((State.deckOffY||0) + row * (State.tileH + (State.gapY != null ? State.gapY : State.gap)));  // gapY: row spacing (proportional)
  const w = Math.round(State.tileW);
  const h = Math.round(State.tileH);
  return { x, y, w, h, col, row };
}
// GRAVITY: pixel rect of a DECK card (deckRow 0 = topmost; deckRow GRAV.DECK_ROWS-1 = just
// above play row 0). Used to render/animate the face-down deck above the play grid.
function deckCellXY(col, deckRow){
  const pad = State.pad || 0;
  const x = pad + Math.round(col * (State.tileW + State.gap));
  const y = pad + Math.round(deckRow * (State.tileH + (State.gapY != null ? State.gapY : State.gap)));
  return { x, y, w: Math.round(State.tileW), h: Math.round(State.tileH), col, deckRow };
}
// source rect into the puzzle image for a tile's HOME cell (single mode).
function srcRect(home){
  const col = home % State.cols, row = (home / State.cols) | 0;
  const sw = State.puzzleImg.width / State.cols;
  const sh = State.puzzleImg.height / State.rows;
  return { sx: col*sw, sy: row*sh, sw, sh };
}
// GRAVITY: a stable, visually-distinct fallback tint per picture (used until its photo
// decodes, and behind the deck dim). Golden-angle hue spread keeps adjacent pics distinct.
function gravPicColor(picId){
  const h = ((picId * 137.508) % 360 + 360) % 360;
  return `hsl(${h.toFixed(0)},58%,52%)`;
}
// GRAVITY: the image + 2×2 source slice for a specific TILE. Each tile belongs to a
// picture (tile.picId) and a sub-position (tile.sub 0..3 = TL,TR,BL,BR). Returns the
// source <img> (or null) plus the sx/sy/sw/sh quarter-rect into it.
function gravTileSrc(ti){
  const t = State.tiles[ti];
  if (!t) return null;
  const img = State.picImg[t.picId];
  if (!img) return null;
  const sw = img.width / 2, sh = img.height / 2;
  const sx = subColOf(t.sub) * sw, sy = subRowOf(t.sub) * sh;
  return { img, sx, sy, sw, sh };
}

// ── rounded-rect path helper (uniform radius) ──────────────────────────────
function rr(ctx, x, y, w, h, r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}
// ── PER-CORNER rounded-rect path (FUSE): rt,rr_,rb,rl_ = top-left, top-right,
// bottom-right, bottom-left corner radii. A corner is rounded only when BOTH of
// its edges are loose; bonded edges square their corners off. ──────────────────
function rrCorners(ctx, x, y, w, h, rTL, rTR, rBR, rBL){
  const m = Math.min(w/2, h/2);
  rTL = Math.min(rTL, m); rTR = Math.min(rTR, m); rBR = Math.min(rBR, m); rBL = Math.min(rBL, m);
  ctx.beginPath();
  ctx.moveTo(x+rTL, y);
  ctx.lineTo(x+w-rTR, y);
  if (rTR>0) ctx.arcTo(x+w, y, x+w, y+rTR, rTR); else ctx.lineTo(x+w, y);
  ctx.lineTo(x+w, y+h-rBR);
  if (rBR>0) ctx.arcTo(x+w, y+h, x+w-rBR, y+h, rBR); else ctx.lineTo(x+w, y+h);
  ctx.lineTo(x+rBL, y+h);
  if (rBL>0) ctx.arcTo(x, y+h, x, y+h-rBL, rBL); else ctx.lineTo(x, y+h);
  ctx.lineTo(x, y+rTL);
  if (rTL>0) ctx.arcTo(x, y, x+rTL, y, rTL); else ctx.lineTo(x, y);
  ctx.closePath();
}

// ── EDGE PROGRESS for a resting cell (FUSE) ────────────────────────────────
// Returns {l,r,t,b} each 0..1: how merged each of the cell's 4 edges is. An edge is
// merged (→1) iff the seam across it is bonded (uses the per-edge bondH/bondV
// progress, which animates 0→1 on new bonds). If `excludeDrag` is set, edges to a
// neighbor that is currently part of the dragged group read as NON-bonded (loose),
// because the group has lifted off the board.
function edgeProgress(ci, excludeDrag){
  const col = ci % State.cols, row = (ci / State.cols) | 0;
  const inDrag = excludeDrag ? (nc) => State.dragging && State.dragging.groupSet && State.dragging.groupSet.has(nc) : () => false;
  const eL = (col>0          && !inDrag(ci-1)          && bondedRight(ci-1, ci))          ? (State.bondH[ci-1]          || 0) : 0;
  const eR = (col<State.cols-1&& !inDrag(ci+1)          && bondedRight(ci, ci+1))          ? (State.bondH[ci]            || 0) : 0;
  const eT = (row>0          && !inDrag(ci-State.cols) && bondedBelow(ci-State.cols, ci)) ? (State.bondV[ci-State.cols] || 0) : 0;
  const eB = (row<State.rows-1&& !inDrag(ci+State.cols)&& bondedBelow(ci, ci+State.cols)) ? (State.bondV[ci]            || 0) : 0;
  return { l:eL, r:eR, t:eT, b:eB };
}

// draw one tile (face-up = picture slice; face-down = card back) into ctx at (x,y).
// FUSE: opts.edges = {l,r,t,b} per-edge bond progress. Bonded edges (→1) extend the
// drawn rect + source slice by gap/2 across that edge (so neighbors meet), drop the
// border rim, and square the corner; loose edges keep the gap + rounded corner + rim.
function drawTile(ctx, ti, x, y, opts){
  opts = opts || {};
  // HIGH-QUALITY photo resampling: the board backing (~913px @2.5 DPR) is larger than the 768px
  // source photo, so the per-tile drawImage UPSCALES it. The canvas default is quality:'low'
  // (blurry bilinear) and is RESET to default on every canvas resize, so set it per-draw here.
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  const scale = opts.scale == null ? 1 : opts.scale;
  const scaleX = (opts.scaleX == null ? 1 : opts.scaleX) * scale;  // flip narrows X only
  // exact per-cell integer w/h (resting tiles) → pixel-perfect flush; fallback to avg tile size
  const w = opts.w != null ? opts.w : State.tileW;
  const h = opts.h != null ? opts.h : State.tileH;
  const tile = State.tiles[ti];
  const E = opts.edges || { l:0, r:0, t:0, b:0 };   // per-edge bond progress
  // bonded edge: extend the box by half-gap + a small BLEED so adjacent bonded tiles OVERLAP
  // (the gap can round to ~1px and leave a visible seam) → a fused picture reads as ONE seamless
  // image. The source slice extends by the matching image fraction so the photo stays continuous.
  const gapYv = (State.gapY != null ? State.gapY : State.gap);
  const ghX = State.gap / 2 + 0.9 * DPR, ghY = gapYv / 2 + 0.9 * DPR;   // per-axis half-gap fill + bleed (proportional gaps)
  const exL = ghX * E.l, exR = ghX * E.r, exT = ghY * E.t, exB = ghY * E.b;
  const W = w + exL + exR, H = h + exT + exB;

  ctx.save();
  if (opts.pivot){
    // GROUP bounce: scale the tile about the GROUP's centre (opts.pivot) so a fused block
    // bounces as ONE unit (not per-piece). Uniform scale; local (0,0) = tile's scaled top-left.
    const s = scale, pv = opts.pivot;
    ctx.translate(pv.x + s*(x - pv.x), pv.y + s*(y - pv.y));
    ctx.scale(s, s);
  } else {
    const cx = x + w/2, cy = y + h/2;
    ctx.translate(cx, cy); ctx.scale(scaleX, scale); ctx.translate(-w/2, -h/2);
  }

  if (opts.shadow){
    ctx.shadowColor = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur = 18 * DPR; ctx.shadowOffsetY = 10 * DPR;
  }
  // per-corner radius: rounded only where BOTH edges are loose (→ radius shrinks as
  // either edge bonds). Uses State.radius as the loose-corner radius.
  const R = State.radius;
  const rTL = R * (1 - Math.max(E.t, E.l));
  const rTR = R * (1 - Math.max(E.t, E.r));
  const rBR = R * (1 - Math.max(E.b, E.r));
  const rBL = R * (1 - Math.max(E.b, E.l));
  rrCorners(ctx, -exL, -exT, W, H, rTL, rTR, rBR, rBL);
  ctx.save(); ctx.clip();

  // face-down card-back (alpha = 1 - reveal)
  const backA = (opts.backAlpha != null) ? opts.backAlpha : (tile.faceUp ? (1 - tile.reveal) : 1);
  const faceA = (opts.faceAlpha != null) ? opts.faceAlpha : (tile.faceUp ? tile.reveal : 0);

  if (backA > 0.001 && State.cardBack){
    ctx.globalAlpha = backA;
    ctx.drawImage(State.cardBack, -exL, -exT, W, H);
  }
  if (faceA > 0.001){
    ctx.globalAlpha = faceA;
    if (IS_GRAVITY){
      // GRAVITY: each tile draws ITS picture's photo (2×2 slice). Falls back to a solid
      // per-picture tint while the photo decodes so a fed/flipped card is never blank.
      const g = gravTileSrc(ti);
      if (g){
        const sxPerPx = g.sw / w, syPerPx = g.sh / h;
        const ssx = g.sx - exL * sxPerPx, ssy = g.sy - exT * syPerPx;
        const ssw = g.sw + (exL + exR) * sxPerPx, ssh = g.sh + (exT + exB) * syPerPx;
        ctx.drawImage(g.img, ssx, ssy, ssw, ssh, -exL, -exT, W, H);
      } else {
        ctx.fillStyle = gravPicColor(tile.picId);
        ctx.fillRect(-exL, -exT, W, H);
      }
    } else if (State.puzzleImg){
      const s = srcRect(tile.home);
      // extend the source slice by the matching image fraction on each bonded edge
      const sxPerPx = s.sw / w, syPerPx = s.sh / h;
      const ssx = s.sx - exL * sxPerPx, ssy = s.sy - exT * syPerPx;
      const ssw = s.sw + (exL + exR) * sxPerPx, ssh = s.sh + (exT + exB) * syPerPx;
      ctx.drawImage(State.puzzleImg, ssx, ssy, ssw, ssh, -exL, -exT, W, H);
    }
  }
  ctx.restore();             // undo clip
  ctx.globalAlpha = 1;
  ctx.shadowColor = 'transparent';
  // PER-EDGE light border ("테두리"): a loose edge gets the rim (alpha by 1-progress);
  // a bonded edge fades its rim out so a fused group has no internal border. Corners
  // are stroked only where loose. Rim also fades globally on completion (gridConverge).
  const rimBase = CFG.BORDER_A * (1 - State.gridConverge);
  if (rimBase > 0.003){
    const inset = 0.75 * DPR;
    ctx.lineWidth = 1.2 * DPR;
    const x0 = inset, y0 = inset, x1 = w - inset, y1 = h - inset;
    const strokeEdge = (ax, ay, bx, by, prog) => {
      const a = rimBase * (1 - prog);
      if (a <= 0.003) return;
      ctx.strokeStyle = 'rgba(255,255,255,' + a.toFixed(3) + ')';
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    };
    // inset corner radii so the rim follows the rounded corners on loose corners
    const cR = Math.max(0, R - inset);
    const cTL = cR * (1 - Math.max(E.t, E.l)), cTR = cR * (1 - Math.max(E.t, E.r));
    const cBR = cR * (1 - Math.max(E.b, E.r)), cBL = cR * (1 - Math.max(E.b, E.l));
    strokeEdge(x0+cTL, y0, x1-cTR, y0, E.t);          // top
    strokeEdge(x1, y0+cTR, x1, y1-cBR, E.r);          // right
    strokeEdge(x1-cBR, y1, x0+cBL, y1, E.b);          // bottom
    strokeEdge(x0, y1-cBL, x0, y0+cTL, E.l);          // left
    // rounded corner arcs (only meaningful where both edges loose → radius>0)
    const arc = (cxr, cyr, r, a0, a1, prog) => {
      if (r <= 0.5) return; const al = rimBase * (1 - prog);
      if (al <= 0.003) return;
      ctx.strokeStyle = 'rgba(255,255,255,' + al.toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(cxr, cyr, r, a0, a1); ctx.stroke();
    };
    arc(x0+cTL, y0+cTL, cTL, Math.PI, 1.5*Math.PI, Math.max(E.t,E.l));     // TL
    arc(x1-cTR, y0+cTR, cTR, 1.5*Math.PI, 2*Math.PI, Math.max(E.t,E.r));   // TR
    arc(x1-cBR, y1-cBR, cBR, 0, 0.5*Math.PI, Math.max(E.b,E.r));           // BR
    arc(x0+cBL, y1-cBL, cBL, 0.5*Math.PI, Math.PI, Math.max(E.b,E.l));     // BL
  }
  ctx.restore();
}

// GRAVITY: draw the face-down DECK above the play grid. Each column's deck stack is
// bottom-anchored to deck row GRAV.DECK_ROWS-1 (the row just above play row 0), so the
// NEXT card to feed sits lowest (closest to the play area). A card may carry an `anim`
// (used while it descends into play during a feed). Drawn dimmer than play tiles.
function drawDeck(){
  if (!IS_GRAVITY) return;
  const h = Math.round(State.tileH);
  const maxSliver = Math.max(7*DPR, Math.round(h * 0.12));   // peek per lower card on a SHALLOW stack
  const pad = State.pad || 0;                                // grid is inset by the canvas headroom → deck must match
  const frontBottom = pad + (State.deckOffY || 0) - State.gap; // front (next-to-feed) card's bottom, just above play grid
  const avail = (State.deckOffY || 0) - State.gap - h;       // vertical room for the pile's spread above the front card
  for (let col=0; col<State.cols; col++){
    const stack = State.deck[col] || [];
    const x = pad + Math.round(col * (State.tileW + State.gap));
    const resting = stack.filter(c => !c.anim);
    const n = resting.length;
    // ADAPTIVE sliver (USER REQ 2026-06-27: decks up to 10 cards): compress the peek so a DEEP stack
    // still fits within the fixed deck region (no overflow into the HUD); shallow stacks unchanged.
    const sliver = n > 1 ? Math.max(2*DPR, Math.min(maxSliver, avail / (n - 1))) : maxSliver;
    // render as a PILE: front card (next to feed = resting[n-1]) lowest; cards behind offset UP by
    // a sliver, drawn front→back so the BACK card sits on top (big) with the others peeking below it.
    for (let k=0; k<n; k++){
      const i = n - 1 - k;                                    // i=n-1 (front) drawn first, i=0 (back) last
      const depth = n - 1 - i;                                // 0=front(lowest) … n-1=back(highest/on top)
      const y = frontBottom - h - depth * sliver;
      bctx.save(); bctx.globalAlpha = GRAV.DECK_DIM;
      drawDeckCard(resting[i], x, y, null);
      bctx.restore();
    }
    // feeding cards (mid-animation) draw at their animated position (flipping into play)
    for (const card of stack){ if (card.anim){
      bctx.save(); if (card.anim.faceAlpha == null) bctx.globalAlpha = GRAV.DECK_DIM;
      drawDeckCard(card, card.anim.x, card.anim.y, card.anim);
      bctx.restore();
    } }
  }
}
// draw a single deck card. While resting it's a dim face-down card; while feeding it uses
// the tile's flip anim (scaleX narrow + back→face swap) like the single-mode reveal.
function drawDeckCard(card, x, y, a){
  const w = Math.round(State.tileW), h = Math.round(State.tileH);
  const ti = card.tileIdx;                                     // tiles entry index (assigned at feed time, may be -1 while queued)
  if (ti >= 0 && a){
    // feeding/flipping: defer to the shared drawTile (handles scaleX + back/face alpha)
    drawTile(bctx, ti, x, y, { w, h, scaleX: a.scaleX, backAlpha: a.backAlpha, faceAlpha: a.faceAlpha, edges:{l:0,r:0,t:0,b:0} });
    return;
  }
  // resting face-down card — with a DROP SHADOW so stacked cards read as a distinct PILE
  // (identical cards with no shadow looked like one tall card). Shadow falls downward onto the
  // card below; a thin rim outlines each card.
  if (State.cardBack){
    bctx.save();
    rrCorners(bctx, x, y, w, h, State.radius, State.radius, State.radius, State.radius);
    bctx.shadowColor = 'rgba(0,0,0,0.45)'; bctx.shadowBlur = 6*DPR; bctx.shadowOffsetY = 5*DPR;
    bctx.fillStyle = '#2f6fe0'; bctx.fill();                   // fill casts the shadow that separates the layers
    bctx.shadowColor = 'transparent';
    bctx.clip();
    bctx.drawImage(State.cardBack, x, y, w, h);
    bctx.restore();
    // crisp top highlight + outline so each card edge is visible in the stack
    bctx.save();
    rrCorners(bctx, x+0.5*DPR, y+0.5*DPR, w-DPR, h-DPR, State.radius, State.radius, State.radius, State.radius);
    bctx.lineWidth = 1.5*DPR; bctx.strokeStyle = 'rgba(255,255,255,0.30)'; bctx.stroke();
    bctx.restore();
  }
}

// ── STATIC-TILE CACHE ──────────────────────────────────────────────────────────
// PERF: every animation frame previously redrew ALL N tiles (each = clip path + photo drawImage
// slice + up to 8 per-edge rim strokes/arcs). During a move only a few tiles actually move; the
// rest are RESTING with stable per-edge bonds. So we bake the resting tiles into an offscreen
// canvas ONCE and per-frame just blit it, then draw only the animating/deferred tiles live.
//
// Safety: during a fuse the merging seams (playMerge) are always INTERNAL to the bouncing/
// emphasis component — every cell touching a new seam is part of that animating block, so a
// RESTING tile's per-edge bond progress never changes mid-fuse. The cache is keyed by a cheap
// signature of the resting set (+gap/radius/converge/layout); when that changes we rebuild.
// It is DISABLED while gridConverge is mid-animation or the phase isn't a stable play state
// (deal-in / reveal flip / completion converge animate edges/reveal globally → full redraw).
let staticC = null, staticCtx = null;            // offscreen canvas of the resting tiles
let staticSig = '';                              // signature of what's currently baked
let staticGen = 0;                               // bumped to force a rebuild when an underlying ASSET changes
                                                 // (photo decodes in, card back rebuilt, puzzle re-set) — these
                                                 // change pixels without changing the cell/tile signature.
function invalidateStaticCache(){ staticGen++; staticSig = ''; }
function staticCacheUsable(){
  const ph = State.phase;
  if (ph !== 'play' && ph !== 'swapping' && ph !== 'complete') return false;
  const gc = State.gridConverge;
  return gc <= 0.0001 || gc >= 0.9999;           // converge mid-animation → edges/gap animate → no cache
}
function drawBoard(){
  bctx.clearRect(0,0,boardCanvas.width, boardCanvas.height);
  drawDeck();                                  // GRAVITY: face-down deck above the play grid (no-op single mode)
  const dragSet = (State.dragging && State.dragging.groupSet) || null;
  const top = [];   // pivot (bounce/emphasis) tiles → draw LAST so the enlarged block is ON TOP

  const useCache = false;   // DISABLED 2026-06-29: the static-tile cache flashed a 1-frame gap during the
                            // lift→land→merge transition (user-reported). Falls through to the original
                            // full-redraw path below (identical to the pre-optimization web rendering).
  if (useCache && staticCacheUsable()){
    // build a cheap signature of the RESTING set (cells that go into the cache) + layout knobs
    let sig = staticGen + '|' + State.gap + '|' + State.radius + '|' + State.boardW + 'x' + State.boardH + '|' + (State.gridConverge>=0.9999?'C':'O') + '|';
    for (let ci=0; ci<State.N; ci++){
      const ti = State.cell[ci];
      if (ti == null) continue;
      if (dragSet && dragSet.has(ci)) continue;
      const a = State.tiles[ti].anim;
      if (a) continue;                           // animating tiles aren't part of the static cache
      sig += ci + ':' + ti + ',';
    }
    if (sig !== staticSig || !staticC){
      if (!staticC || staticC.width !== boardCanvas.width || staticC.height !== boardCanvas.height){
        staticC = document.createElement('canvas');
        staticC.width = boardCanvas.width; staticC.height = boardCanvas.height;
        staticCtx = staticC.getContext('2d');
      }
      staticCtx.clearRect(0,0,staticC.width, staticC.height);
      for (let ci=0; ci<State.N; ci++){
        const ti = State.cell[ci];
        if (ti == null) continue;
        if (dragSet && dragSet.has(ci)) continue;
        if (State.tiles[ti].anim) continue;
        const p = cellXY(ci);
        drawTile(staticCtx, ti, p.x, p.y, { w: p.w, h: p.h, edges: edgeProgress(ci, true) });
      }
      staticSig = sig;
    }
    bctx.drawImage(staticC, 0, 0);               // blit the resting tiles in one op
    // draw ONLY the animating tiles live (deferred pivot/top tiles go to popfx)
    for (let ci=0; ci<State.N; ci++){
      const ti = State.cell[ci];
      if (ti == null) continue;
      if (dragSet && dragSet.has(ci)) continue;
      const a = State.tiles[ti].anim;
      if (!a) continue;
      if (a.pivot || a.top){ top.push({ ci, ti, a }); continue; }
      const E = a.edges || edgeProgress(ci, true);
      drawTile(bctx, ti, a.x, a.y, { scale: a.scale, scaleX: a.scaleX, shadow: a.shadow, backAlpha: a.backAlpha, faceAlpha: a.faceAlpha, edges: E });
    }
  } else {
    staticSig = '';                              // invalidate so the next cacheable frame rebuilds
    for (let ci=0; ci<State.N; ci++){
      const ti = State.cell[ci];
      if (ti == null) continue;
      if (dragSet && dragSet.has(ci)) continue;  // the whole grabbed group floats on #drag
      const a = State.tiles[ti].anim;
      if (a && (a.pivot || a.top)){ top.push({ ci, ti, a }); continue; }   // defer: grabbed/enlarged block draws above neighbors
      if (a) {
        const E = a.edges || edgeProgress(ci, true);
        drawTile(bctx, ti, a.x, a.y, { scale: a.scale, scaleX: a.scaleX, shadow: a.shadow, backAlpha: a.backAlpha, faceAlpha: a.faceAlpha, edges: E });
      } else {
        const p = cellXY(ci);
        drawTile(bctx, ti, p.x, p.y, { w: p.w, h: p.h, edges: edgeProgress(ci, true) });   // exact integer cell
      }
    }
  }
  // the grabbed/enlarged block + its glow render on the #popfx OVERLAY (above the grid, covering the
  // wrap) so an enlarging block overflows the grid edge WITHOUT being clipped by the board canvas.
  drawPopFx(top);
}

// render the deferred (grabbed/popping) tiles + the fuse glow onto the overlay canvas. The overlay
// spans the whole board-wrap; State.fxOff maps board-local cellXY coords onto it. Cleared every
// frame, so a finished pop vanishes. Nothing deferred + no glow → just a clear (no cost).
function drawPopFx(top){
  if (!pfx) return;
  pfx.clearRect(0, 0, popfxCanvas.width, popfxCanvas.height);
  const hasGlow = State.fx && State.fx.glow > 0.01;
  if (!top.length && !hasGlow) return;
  refreshFxOff();                         // live overlay origin — self-corrects first-stage staleness (see refreshFxOff)
  pfx.save();
  pfx.translate(State.fxOffX || 0, State.fxOffY || 0);
  if (hasGlow) drawBlockGlow(pfx, State.fx);            // glow behind the lifted tiles
  for (const { ci, ti, a } of top){
    const E = a.edges || edgeProgress(ci, true);
    drawTile(pfx, ti, a.x, a.y, { scale: a.scale, scaleX: a.scaleX, shadow: a.shadow, backAlpha: a.backAlpha, faceAlpha: a.faceAlpha, edges: E, pivot: a.pivot });
  }
  pfx.restore();
}

// white glowing halo around a fused block's ACTUAL SILHOUETTE (per-cell, so an L-shaped
// block glows L-shaped — not a bounding box). Each block cell is filled (white) + shadow-blurred;
// the fills are covered by the block tiles drawn on top, so only the outer halo + a thin rim show.
// Cells are expanded by ~half-gap so the union is solid (no internal-seam glow).
//
// PERF: the silhouette geometry (cells/pad/radius/blur extent) is FIXED for the duration of one
// bounce — only the per-frame alpha (fx.glow) and pivot scale (fx.scale) change. So we BAKE the
// white-silhouette + blurred halo ONCE (at full glow=1, scale=1) into an offscreen canvas (fx._glowC)
// and per-frame just blit that bitmap, transformed about the pivot by fx.scale, at alpha=fx.glow.
// This removes the two per-frame ctx.shadowBlur passes × N cells (the single most expensive op) —
// shadowBlur now runs ONCE per fuse instead of once per cell per frame. Visual result is identical
// at the glow peak (where the halo dominates perception); the fade tails differ only imperceptibly
// (baked blur extent is constant rather than shrinking with glow, but alpha still fades to 0).
//
// The sprite is baked at HALF resolution (GLOW_DS) then upscaled on blit. The glow is a soft blur,
// so a half-res bake (blur radius scaled to match) upscaled with smoothing is visually identical —
// and shrinks the freshly-created canvas 4× so its first-draw GPU texture upload (the real spike on
// the first glow frame) is ~4× cheaper. After baking we pre-warm the texture with one off-screen
// blit so the upload cost lands on the resolve task, not the first visible animation frame.
const GLOW_DS = 0.5;                                       // glow bake downscale (soft halo → no visible loss)
function buildGlowSprite(fx){
  const cells = fx.cells; if (!cells || !cells.length) return null;
  const r = (State.radius > 0 ? State.radius : 6*DPR);
  const pad = (State.gap || 0) / 2 + 1.5 * DPR;            // bridge internal gaps → solid silhouette
  // bounding box of the (unscaled) padded silhouette in board-local coords
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of cells){
    const p = cellXY(c);
    if (p.x - pad < minX) minX = p.x - pad;
    if (p.y - pad < minY) minY = p.y - pad;
    if (p.x + p.w + pad > maxX) maxX = p.x + p.w + pad;
    if (p.y + p.h + pad > maxY) maxY = p.y + p.h + pad;
  }
  const margin = Math.ceil(22 * DPR + 4 * DPR);            // room for the widest shadowBlur halo (full-res units)
  const ox = Math.floor(minX - margin), oy = Math.floor(minY - margin);   // sprite origin in board-local (full-res) coords
  const fw = Math.ceil(maxX + margin) - ox, fh = Math.ceil(maxY + margin) - oy;  // full-res sprite size
  if (fw <= 0 || fh <= 0) return null;
  const ds = GLOW_DS;
  const cnv = document.createElement('canvas');
  cnv.width = Math.max(1, Math.round(fw * ds)); cnv.height = Math.max(1, Math.round(fh * ds));
  const g = cnv.getContext('2d');
  g.scale(ds, ds);                                         // bake at half scale (everything below is full-res units)
  g.translate(-ox, -oy);                                   // bake in board-local coords (offset by ox/oy)
  g.shadowColor = 'rgba(255,255,255,0.95)';
  g.fillStyle = 'rgba(255,255,255,0.9)';
  for (const blur of [22, 10]){                            // two passes → denser halo (baked at full glow=1)
    g.shadowBlur = blur * DPR;                             // shadowBlur is in the scaled space → matches when upscaled ×1/ds
    for (const c of cells){
      const p = cellXY(c);
      rr(g, p.x - pad, p.y - pad, p.w + 2*pad, p.h + 2*pad, r); g.fill();
    }
  }
  fx._glowC = cnv; fx._glowOX = ox; fx._glowOY = oy; fx._glowDS = ds;
  // PRE-WARM the texture: a single 1px blit forces the GPU upload now (on the resolve task) instead
  // of on the first visible glow frame, eliminating that frame's upload spike.
  try { pfx.drawImage(cnv, -9999, -9999, 1, 1); } catch(_){}
  return cnv;
}
function drawBlockGlow(ctx, fx){   // SPRITE version (re-applied 2026-06-29): blit the once-baked halo, no per-frame shadowBlur.
  // The two ctx.shadowBlur passes × N cells used to run EVERY frame (the single most expensive op,
  // and the source of the capture's per-merge frame drops). Now the silhouette+halo is baked ONCE
  // into fx._glowC (buildGlowSprite) and each frame just blits that bitmap, transformed about the
  // pivot by fx.scale, at globalAlpha=fx.glow → smooth merges. Visually identical at the glow peak.
  if (!fx._glowC){ if (!buildGlowSprite(fx)) return; }
  const cells = fx.cells; if (!cells || !cells.length) return;
  const s = fx.scale, pv = fx.pivot;
  const inv = 1 / (fx._glowDS || 1);                       // sprite was baked at downscale ds → full-res size = w/ds
  const fw = fx._glowC.width * inv, fh = fx._glowC.height * inv;   // sprite footprint in full-res board-local units
  // sprite top-left in board-local coords (fx._glowOX/OY), then scaled about the pivot by fx.scale
  const dx = pv.x + s * (fx._glowOX - pv.x);
  const dy = pv.y + s * (fx._glowOY - pv.y);
  ctx.save();
  ctx.globalAlpha = clamp01(fx.glow);
  ctx.drawImage(fx._glowC, dx, dy, fw * s, fh * s);
  ctx.restore();
}

// ════════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP — a single rAF runs only while there are active anims.
// Each anim writes tile.anim = {x,y,scale,...}; on finish it clears and the tile
// snaps back to its cell rest position in drawBoard.
// ════════════════════════════════════════════════════════════════════════════
let rafId = 0;
function ensureLoop(){ if (!rafId) rafId = requestAnimationFrame(tick); }
// SELF-HEAL: never let one bad frame / stuck resolve permanently freeze the game. Clears any
// in-flight anims and returns to a playable state (a left-over completed picture re-clears on the
// next move). Used by tick()'s catch and by onPointerDown if it finds the game stuck-busy.
function recoverFromStuck(){
  State.anims.length = 0; State.fx = null;
  for (const t of State.tiles){ if (t) t.anim = null; }
  State.busy = false; State.dragging = null;
  if (State.phase !== 'complete') State.phase = 'play';
  try { drawBoard(); } catch (_){}
}
function tick(){
  rafId = 0;
  try {
    const t = now();
    let alive = false;
    for (let i=State.anims.length-1; i>=0; i--){
      const a = State.anims[i];
      const done = a.update(t);
      if (done){ a.finish && a.finish(); State.anims.splice(i,1); }
      else alive = true;
    }
    // confetti runs on its own flag
    if (confettiActive) { stepConfetti(t); alive = true; }
    drawBoard();
    if (alive || confettiActive) rafId = requestAnimationFrame(tick);
    else if (State.gridConverge >= 1) drawBoard();
  } catch (e) {
    try { console.error('[pp] anim loop recovered from error:', e && e.message); } catch (_){}
    recoverFromStuck();
  }
}

// ── DEAL-IN: tiles fly in face-down, staggered, ease-out, land bounce ──────────
function dealIn(onDone){
  State.phase = 'deal';
  const t0 = now();
  const boardH = State.boardH;
  const boardW = State.boardW;
  let remaining = 0; for (let ci=0; ci<State.N; ci++) if (State.cell[ci] != null) remaining++;  // null-safe (partial board)
  if (remaining === 0){ onDone && onDone(); return; }
  for (let ci=0; ci<State.N; ci++){
    const ti = State.cell[ci];
    if (ti == null) continue;                       // skip empty cells (reshuffle may leave top rows empty)
    const tile = State.tiles[ti];
    tile.faceUp = false; tile.reveal = 0;
    const p = cellXY(ci);
    const start = t0 + ci * CFG.DEAL_STAGGER;
    const dur = CFG.DEAL_DUR;
    const fromY = p.y + boardH * CFG.DEAL_FROM_Y;
    const fromX = p.x + (((ci % State.cols) - (State.cols-1)/2)) * boardW * CFG.DEAL_FROM_SPREADX;
    tile.anim = { x: fromX, y: fromY, scale: 1, shadow:false, backAlpha:1, faceAlpha:0 };
    State.anims.push({
      update(t){
        if (t < start){ return false; }
        const k = clamp01((t - start) / dur);
        const e = easeOut(k);
        tile.anim.x = lerp(fromX, p.x, e);
        tile.anim.y = lerp(fromY, p.y, e);
        // land bounce: tiny scale pop near the end
        const bk = k > 0.78 ? (k - 0.78) / 0.22 : 0;
        tile.anim.scale = 1 + Math.sin(bk * Math.PI) * CFG.DEAL_BOUNCE;
        return k >= 1;
      },
      finish(){ tile.anim = null; if (IS_GRAVITY) haptic('selection'); if (--remaining === 0) onDone && onDone(); }   // gravity: tap as each dealt piece LANDS (user req)
    });
  }
  ensureLoop();
}

// ── REVEAL: face-down → scrambled picture cross-fade (slight stagger) ──────────
function reveal(onDone){
  State.phase = 'reveal';
  const t0 = now() + CFG.REVEAL_DELAY;
  let remaining = 0; for (let ci=0; ci<State.N; ci++) if (State.cell[ci] != null) remaining++;  // null-safe (partial board)
  if (remaining === 0){ onDone && onDone(); return; }
  // reveal in cell order for a readable sweep
  for (let ci=0; ci<State.N; ci++){
    const ti = State.cell[ci];
    if (ti == null) continue;                       // skip empty cells (reshuffle may leave top rows empty)
    const tile = State.tiles[ti];
    tile.faceUp = true; tile.reveal = 0;
    const p = cellXY(ci);
    const start = t0 + ci * CFG.REVEAL_STAGGER;
    const dur = CFG.REVEAL_DUR;
    tile.anim = { x:p.x, y:p.y, scale:1, scaleX:1, shadow:false, backAlpha:1, faceAlpha:0 };
    State.anims.push({
      update(t){
        if (t < start) return false;
        const k = clamp01((t - start) / dur);
        // true Y-axis flip: width narrows to an edge-on strip at the mid (scaleX→0),
        // the back shows on the first half, the face swaps in for the second half.
        const half = k < 0.5;
        tile.anim.scaleX   = Math.abs(Math.cos(k * Math.PI)); // 1 → 0 → 1
        tile.anim.backAlpha = half ? 1 : 0;
        tile.anim.faceAlpha = half ? 0 : 1;
        tile.reveal = half ? 0 : 1;
        return k >= 1;
      },
      finish(){ tile.anim = null; tile.reveal = 1; if (--remaining === 0) onDone && onDone(); }
    });
  }
  ensureLoop();
}

// ── BLOCK-SWAP RESOLVE (FUSE) ──────────────────────────────────────────────────
// Move the grabbed `group` (array of cells) by t=(dcol,drow). Every group piece
// moves by t; every NON-group piece in the group's NEW footprint moves by -t (into
// the vacated cells). This is a valid permutation. Returns the list of {ti, fromCell,
// toCell} moves so the caller can animate. Mutates State.cell.
// Move `group` rigidly by (tDcol,tDrow). The grabbed group is ALWAYS kept intact (never split);
// the non-group pieces it lands on STEP ASIDE into the cells the group vacates. Collision-free:
// the involved cells are exactly C ∪ (C+t); group → C+t, displaced → freed cells (C\(C+t)).
function applyBlockSwap(group, tDcol, tDrow){
  const cols = State.cols;
  const before = State.cell.slice();
  const groupSet = new Set(group);
  const newFootprint = group.map((ci) => (((ci / cols | 0) + tDrow) * cols + (ci % cols + tDcol)));
  const newSet = new Set(newFootprint);

  const freed = group.filter((ci) => !newSet.has(ci));            // group's old cells not re-occupied
  const displaced = newFootprint.filter((nc) => !groupSet.has(nc)); // non-group cells the group lands on
  // |displaced| === |freed| (rigid translation) — assign each displaced piece a freed cell, preferring
  // the natural −t shift (so a clean swap looks like the block sliding), filling leftovers in order.
  const freedSet = new Set(freed), usedFreed = new Set(), leftover = [];
  const assign = {};
  for (const d of displaced){
    const cand = ((d / cols | 0) - tDrow) * cols + (d % cols - tDcol);
    if (freedSet.has(cand) && !usedFreed.has(cand)){ usedFreed.add(cand); assign[d] = cand; }
    else leftover.push(d);
  }
  const remainingFreed = freed.filter((c) => !usedFreed.has(c));
  leftover.forEach((d, k) => { assign[d] = remainingFreed[k]; });

  const moves = [];
  group.forEach((ci, i) => { moves.push({ ti: before[ci], fromCell: ci, toCell: newFootprint[i] }); });
  for (const d of displaced){ moves.push({ ti: before[d], fromCell: d, toCell: assign[d] }); }

  // commit fresh (every involved source is also a target → no stale cells, no collisions)
  const result = before.slice();
  for (const m of moves) result[m.toCell] = m.ti;
  State.cell = result;
  return moves;
}

// Animate a block-swap: pieces tween from→to. The GRABBED group then bounces as ONE unit
// (about its centre, via bounceGroup); displaced pieces settle individually. `bounceCells` =
// the grabbed block to bounce together; `emphasisCells` = the component that ACTUALLY fused
// (grabbed OR displaced) and gets the enlarge+glow, or null when no new bond formed.
function animateMoves(moves, grabbedGroup, bounceCells, emphasisCells, onDone){
  State.phase = 'swapping';
  const t0 = now();
  const cols = State.cols;
  // drop the no-op moves of an EMPTY cell (ti==null) — the swap into a gap (rare: deck exhausted)
  // already committed its permutation in applyBlockSwap; there's nothing to animate, and indexing
  // State.tiles[null] would throw. (Filter is harmless when the board is full — no null tiles.)
  moves = moves.filter((m) => State.tiles[m.ti] != null);
  const groupSet = new Set(grabbedGroup);
  // EMPHASIS routing (enlarge + white glow) — goes to the component that ACTUALLY fused, which
  // is NOT always the grabbed block: in a swap the DISPLACED piece can be the one that bonds at
  // its new spot (user bug — glow appeared on the dragged piece, not the merged one). If the
  // fused component is the grabbed block, its settle bounce carries the emphasis; if it's a
  // SEPARATE (displaced) block, that block gets its own emphasis bounce once its pieces land.
  const emphSet = emphasisCells ? new Set(emphasisCells) : null;
  const grabbedEmph = !!(emphSet && bounceCells.some(c => emphSet.has(c)));
