    const e = easeOutBack(k);
    rewardEl.style.transform = 'translate(-50%,-100%) scale(' + (0.4 + 0.6*e) + ')';
    rewardEl.style.opacity = String(clamp01(k*1.5));
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
// Position the earned-coin pill so its CENTER straddles the photo's BOTTOM EDGE (user ref IMG_3302):
// single mode → measure the framed (#board.complete) photo; gravity (no framed photo) → lower-center.
function placeReward(){
  if (!overlay || overlay.style.display === 'none') return;
  const sr = document.getElementById('stage').getBoundingClientRect();
  if (!IS_GRAVITY && boardCanvas.classList.contains('complete')){
    const br = boardCanvas.getBoundingClientRect();
    rewardEl.style.left = (br.left + br.width / 2 - sr.left) + 'px';
    rewardEl.style.top  = (br.bottom - sr.top) + 'px';
  } else {
    rewardEl.style.left = (sr.width / 2) + 'px';
    rewardEl.style.top  = (sr.height * 0.80) + 'px';
  }
}
function showNext(){
  const t0 = now();
  function step(){
    const k = clamp01((now() - t0) / 240);
    const e = easeOutBack(k);
    nextBtn.style.transform = 'translateY(' + lerp(18,0,e) + 'px) scale(' + (0.9 + 0.1*e) + ')';
    nextBtn.style.opacity = String(k);
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── RESULT-SCREEN MONTAGE (gravity only) ───────────────────────────────────────
// A looping wall of small portrait thumbnails of the pictures the player cleared this
// stage: each card fades IN → holds → fades OUT at a random scattered, slightly-rotated
// position, many overlapping at once, spawning sequentially and cycling forever until
// the player taps Next. Drawn on its own pointer-events:none canvas in the middle band.
let montageRaf = 0;          // active rAF handle (0 = stopped)
let montageCards = [];       // live cards {x,y,rot,scale,pid,born,life}
let montageT0 = 0;           // loop start time
let montageNextSpawn = 0;    // next spawn time (ms, performance.now)
let montageSeq = 0;          // index into the cleared-picture cycle
const MONTAGE_SPAWN_MS = 220;  // gap between spawns
const MONTAGE_LIFE = 900;      // total card lifecycle (fade-in 160 + hold 420 + fade-out 320)

// size the montage canvas to fill the band BETWEEN the banner (top) and result-bottom.
function sizeMontage(){
  const overlayR = overlay.getBoundingClientRect();
  if (!overlayR.width || !overlayR.height) return;
  // band = from just below the banner to just above the bottom controls
  const bannerR = banner.getBoundingClientRect();
  const bottomR = document.getElementById('result-bottom').getBoundingClientRect();
  let top = (bannerR.bottom || overlayR.top) - overlayR.top + 10;
  let bot = (bottomR.top   || overlayR.bottom) - overlayR.top - 10;
  if (!(bot > top)) { top = overlayR.height * 0.16; bot = overlayR.height * 0.82; }   // fallback band
  const cssW = overlayR.width, cssH = Math.max(40, bot - top);
  montageCanvas.style.top    = top + 'px';
  montageCanvas.style.height = cssH + 'px';
  montageCanvas.width  = Math.round(cssW * DPR);
  montageCanvas.height = Math.round(cssH * DPR);
}

// draw one cleared-picture card: cover-fit photo into a rounded portrait card with white rim + shadow.
function drawMontageCard(card){
  const cw = montageCanvas.width, ch = montageCanvas.height;
  const cardW = cw * 0.22;                 // ~22% of canvas width
  const cardW2 = cardW * card.scale, cardH2 = cardW2 * 1.5;   // 2:3 portrait
  const rad = cardW2 * 0.12;
  mctx.save();
  mctx.globalAlpha = card.alpha;
  mctx.translate(card.x, card.y);
  mctx.rotate(card.rot);
  // soft drop shadow
  mctx.shadowColor = 'rgba(0,0,0,.45)';
  mctx.shadowBlur = cardW2 * 0.18; mctx.shadowOffsetY = cardW2 * 0.06;
  // white rim
  const rim = cardW2 * 0.06;
  mctx.fillStyle = '#ffffff';
  rr(mctx, -cardW2/2 - rim, -cardH2/2 - rim, cardW2 + rim*2, cardH2 + rim*2, rad + rim);
  mctx.fill();
  mctx.shadowColor = 'transparent'; mctx.shadowBlur = 0; mctx.shadowOffsetY = 0;
  // clip to the card and cover-fit the photo (or a solid fallback tint)
  rr(mctx, -cardW2/2, -cardH2/2, cardW2, cardH2, rad);
  mctx.clip();
  const img = State.picImg[card.pid];
  if (img && img.width){
    const iw = img.width, ih = img.height, ir = iw/ih, cr = cardW2/cardH2;
    let sw, sh, sx, sy;
    if (ir > cr){ sh = ih; sw = ih*cr; sx = (iw-sw)/2; sy = 0; }   // cover-fit (crop sides)
    else        { sw = iw; sh = iw/cr; sx = 0; sy = (ih-sh)/2; }
    mctx.drawImage(img, sx, sy, sw, sh, -cardW2/2, -cardH2/2, cardW2, cardH2);
  } else {
    mctx.fillStyle = gravPicColor(card.pid);
    mctx.fillRect(-cardW2/2, -cardH2/2, cardW2, cardH2);
  }
  mctx.restore();
}

function montageStep(){
  const t = now();
  const cw = montageCanvas.width, ch = montageCanvas.height;
  mctx.clearRect(0, 0, cw, ch);
  // cleared pictures (fallback to a default set if none were recorded)
  const pics = (State.clearedList && State.clearedList.length) ? State.clearedList : [0,1,2,3];
  // spawn new cards on a steady cadence, cycling through the cleared pics in order
  while (t >= montageNextSpawn){
    const pid = pics[montageSeq % pics.length]; montageSeq++;
    const cardW = cw * 0.22, cardH = cardW * 1.5;
    const mx = cardW * 0.6, my = cardH * 0.5;       // keep most of the card on-canvas
    // play WITHIN a centered, WIDE GRID box — not the full result band (USER REQ 2026-06-27: a
    // full-screen scatter looked awkward). Wide horizontally, a contained band vertically, centered.
    const gridW = cw * 0.96, gridH = Math.min(ch, cw * 0.92);
    const gx = (cw - gridW) / 2, gy = (ch - gridH) / 2;
    montageCards.push({
      pid,
      x: gx + mx + Math.random() * Math.max(1, gridW - mx*2),
      y: gy + my + Math.random() * Math.max(1, gridH - my*2),
      rot: (Math.random() - 0.5) * (Math.PI/180) * 30,   // ±15°
      scale: 0.86 + Math.random() * 0.34,                 // slight size variety
      born: t, life: MONTAGE_LIFE, alpha: 0,
    });
    montageNextSpawn += MONTAGE_SPAWN_MS;
    if (montageNextSpawn < t - MONTAGE_SPAWN_MS*4) montageNextSpawn = t + MONTAGE_SPAWN_MS;  // catch up after a stall
  }
  // update + draw live cards; cull dead ones
  for (let i = montageCards.length - 1; i >= 0; i--){
    const c = montageCards[i];
    const age = t - c.born, k = age / c.life;
    if (k >= 1){ montageCards.splice(i, 1); continue; }
    // fade-in 160ms → hold → fade-out last 320ms
    const fadeIn = clamp01(age / 160);
    const fadeOut = clamp01((c.life - age) / 320);
    c.alpha = Math.min(fadeIn, fadeOut);
  }
  // draw oldest→newest so newer cards overlap on top
  for (let i = 0; i < montageCards.length; i++) drawMontageCard(montageCards[i]);
  montageRaf = requestAnimationFrame(montageStep);
}

function startMontage(){
  if (!IS_GRAVITY) return;
  stopMontage();
  sizeMontage();
  montageCards = []; montageSeq = 0; montageT0 = now();
  montageNextSpawn = montageT0;     // spawn the first card immediately
  montageCanvas.style.display = 'block';
  montageRaf = requestAnimationFrame(montageStep);
  // re-measure once the banner has finished its scale-in (its rect shifts during the pop)
  setTimeout(() => { if (montageRaf) sizeMontage(); }, 520);
}

function stopMontage(){
  if (montageRaf){ cancelAnimationFrame(montageRaf); montageRaf = 0; }
  montageCards = [];
  if (mctx) mctx.clearRect(0, 0, montageCanvas.width, montageCanvas.height);
  montageCanvas.style.display = 'none';
}

// keep the montage canvas correctly sized while the result screen is up
window.addEventListener('resize', () => { if (montageRaf) sizeMontage(); });

// ── bounded confetti burst ─────────────────────────────────────────────────
let confettiActive = false, confettiParts = [], confettiT0 = 0;
const cctx = confettiCanvas.getContext('2d');
// multicolor celebratory burst (matches the reference result-screen confetti)
const CONFETTI_COLORS = ['#ff5d8f','#ffd54a','#5bd1ff','#7cf29c','#c084fc','#ff8a3d','#ffffff'];
function fireConfetti(){
  confettiCanvas.style.display = 'block';
  confettiParts.length = 0;
  const cw = confettiCanvas.width, ch = confettiCanvas.height;
  const COL = () => CONFETTI_COLORS[(Math.random()*CONFETTI_COLORS.length)|0];
  // 1) initial center POP burst (the celebratory "pop")
  const ox = cw/2, oy = ch*0.42;
  for (let i=0;i<CFG.CONFETTI_N;i++){
    const ang = (-Math.PI/2) + (Math.random()-0.5) * Math.PI * 1.2;
    const spd = (3 + Math.random()*7) * DPR;
    confettiParts.push({
      x: ox + (Math.random()-0.5)*60*DPR, y: oy,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 4*DPR,
      g: 0.22*DPR, w: (5+Math.random()*7)*DPR, h:(7+Math.random()*9)*DPR,
      rot: Math.random()*Math.PI, vr:(Math.random()-0.5)*0.4, c: COL(), sway: 0, swayAmp: 0,
    });
  }
  // 2) RAIN FROM THE SKY (user req): pieces start ABOVE the top (staggered via negative y) and
  // FLUTTER down across the whole width — a steady confetti rain, not just a one-shot burst.
  const rainN = Math.round(CFG.CONFETTI_N * 2.2);
  for (let i=0;i<rainN;i++){
    confettiParts.push({
      x: Math.random()*cw, y: -Math.random()*ch*0.45,             // staggered entry from just above the top
      vx: (Math.random()-0.5)*1.0*DPR, vy: (4 + Math.random()*5)*DPR,
      g: 0.12*DPR, w: (5+Math.random()*7)*DPR, h:(8+Math.random()*10)*DPR,
      rot: Math.random()*Math.PI*2, vr:(Math.random()-0.5)*0.3, c: COL(),
      sway: Math.random()*Math.PI*2, swayAmp: (1 + Math.random()*2)*DPR,   // gentle side-to-side flutter
    });
  }
  confettiActive = true; confettiT0 = now(); ensureLoop();
}
function stepConfetti(t){
  const cw = confettiCanvas.width, ch = confettiCanvas.height;
  cctx.clearRect(0,0,cw,ch);
  const age = t - confettiT0;
  const fade = clamp01(1 - (age - CFG.CONFETTI_MS*0.78) / (CFG.CONFETTI_MS*0.22));   // only fade near the very end
  const term = 14*DPR;
  for (const p of confettiParts){
    p.vy += p.g; if (p.vy > term) p.vy = term;                  // terminal velocity (natural fall)
    p.sway += 0.08; p.x += p.vx + Math.sin(p.sway)*(p.swayAmp||0); p.y += p.vy; p.rot += p.vr;
    cctx.save(); cctx.translate(p.x,p.y); cctx.rotate(p.rot);
    cctx.globalAlpha = fade; cctx.fillStyle = p.c;
    cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cctx.restore();
  }
  if (age > CFG.CONFETTI_MS){
    confettiActive = false; confettiParts.length = 0;
    cctx.clearRect(0,0,cw,ch); confettiCanvas.style.display='none';
  }
}

// ════════════════════════════════════════════════════════════════════════════
// DRAG INPUT — pointer-based. The dragged tile renders on a SEPARATE canvas
// (#drag) moved by transform only; the board canvas is redrawn ONLY when the
// hovered target cell changes (perf: no per-frame board redraw while dragging).
// ════════════════════════════════════════════════════════════════════════════
function cellAtPoint(localX, localY){
  // localX/Y in board-local @DPR coords
  for (let ci=0; ci<State.N; ci++){
    const p = cellXY(ci);
    if (localX >= p.x && localX <= p.x + p.w &&
        localY >= p.y && localY <= p.y + p.h) return ci;
  }
  return -1;
}
function toLocal(clientX, clientY){
  // client(CSS px) → board-local @backing px. Use the LIVE rect ratio (backing / rendered width),
  // NOT a hard-coded ×DPR: when a reels/webview HOST renders the game at a content-scale (iOS WKWebView
  // can render the page zoomed), getBoundingClientRect().width ≠ style width, so backing/rect ≠ DPR. The
  // ×DPR form then mismaps every drop (lands up-left / off-board) — the "merges in the wrong place" bug
  // that only showed in the reels host, never on the plain web page (where the ratio == DPR). The ratio
  // form is identical to ×DPR when unscaled and self-corrects under any host scale. cellXY/cellCenter
  // share this basis (cellCenter uses the inverse ratio), so forward/inverse stay consistent.
  const r = boardCanvas.getBoundingClientRect();
  return { x: (clientX - r.left) * (boardCanvas.width / r.width),
           y: (clientY - r.top ) * (boardCanvas.height / r.height) };
}

let lastHover = -1;
// Render the WHOLE grabbed GROUP onto #drag as a rigid block: each group piece is
// drawn at its relative cell offset within the group's bounding box, with the pick
// scale applied to the block as a unit. Internal seams (edges between two group
// members) render seamless (bonded); the outer perimeter keeps the border/gap.
function renderDragCanvas(){
  const d = State.dragging;
  const group = d.group;
  // group bounding box in cells → pixel box (use cellXY anchors, integer)
  let minCol=Infinity, minRow=Infinity, maxCol=-Infinity, maxRow=-Infinity;
  for (const ci of group){
    const c = ci%State.cols, r = (ci/State.cols)|0;
    if (c<minCol) minCol=c; if (c>maxCol) maxCol=c;
    if (r<minRow) minRow=r; if (r>maxRow) maxRow=r;
  }
  const anchor = cellXY(minRow*State.cols + minCol);        // top-left cell of the bbox
  // bbox pixel extent: from anchor to the far cell's right/bottom
  const farCell = cellXY(maxRow*State.cols + maxCol);
  const bw = (farCell.x + farCell.w) - anchor.x;
  const bh = (farCell.y + farCell.h) - anchor.y;
  const pad = 24 * DPR;
  const sc = CFG.PICK_SCALE;
  const cw = bw*sc + pad*2, ch = bh*sc + pad*2;
  dragCanvas.width = Math.round(cw); dragCanvas.height = Math.round(ch);
  dragCanvas.style.width = (cw/DPR)+'px'; dragCanvas.style.height = (ch/DPR)+'px';
  dctx.clearRect(0,0,cw,ch);

  // origin so the (scaled) block is centred in the padded canvas
  dctx.save();
  dctx.translate(pad + (bw*(sc-1))/2, pad + (bh*(sc-1))/2);
  const groupSet = new Set(group);
  // single shadow under the whole block: stamp the silhouette once, then draw faces flat
  for (const ci of group){
    const ti = State.cell[ci];
    const p = cellXY(ci);
    const lx = (p.x - anchor.x), ly = (p.y - anchor.y);
    // edges: bonded (→1) to a neighbor that's ALSO in the group; loose (0) to outside
    const c = ci%State.cols, r = (ci/State.cols)|0;
    const E = {
      l: (c>0            && groupSet.has(ci-1))          ? 1 : 0,
      r: (c<State.cols-1 && groupSet.has(ci+1))          ? 1 : 0,
      t: (r>0            && groupSet.has(ci-State.cols)) ? 1 : 0,
      b: (r<State.rows-1 && groupSet.has(ci+State.cols)) ? 1 : 0,
    };
    drawTile(dctx, ti, lx, ly, { w: p.w, h: p.h, scale: sc, shadow: group.length===1, edges: E });
  }
  dctx.restore();
  d.padPx = pad;
  d.bbox = { minCol, minRow, anchorX: anchor.x, anchorY: anchor.y, bw, bh };
}
function moveDragCanvas(clientX, clientY){
  // Position #drag (transform only) so the grabbed PIECE's centre sits under the
  // finger (corrected by the grab offset). The dragCanvas has `pad` of empty room +
  // the whole group; the grabbed piece sits at its bbox-relative offset inside.
  const d = State.dragging;
  const wrapR = document.getElementById('board-wrap').getBoundingClientRect();
  const pad = d.padPx / DPR;                            // @DPR → CSS px
  const sc = CFG.PICK_SCALE;
  // grabbed piece's top-left within the (unscaled) bbox, in CSS px
  const gp = cellXY(d.originCell);
  const offCSSx = (gp.x - d.bbox.anchorX) / DPR;
  const offCSSy = (gp.y - d.bbox.anchorY) / DPR;
  const cssTileW = gp.w / DPR, cssTileH = gp.h / DPR;
  // block centre offset (the (sc-1) recentre applied in renderDragCanvas, CSS px)
  const recX = (d.bbox.bw*(sc-1))/2 / DPR, recY = (d.bbox.bh*(sc-1))/2 / DPR;
  const cx = clientX - d.grabDX;                        // desired grabbed-piece centre X
  const cy = clientY - d.grabDY;
  // host content-scale (1 when unscaled): the #drag transform is in board-wrap LOCAL (pre-scale) px,
  // but (cx-wrapR.left) is a post-scale client delta — divide it out so the piece tracks the finger
  // even when a reels host renders the game zoomed. The nominal /DPR terms already scale with the host.
  const bcr = boardCanvas.getBoundingClientRect();
  const z = bcr.width / (parseFloat(boardCanvas.style.width) || bcr.width);
  // canvas top-left = piece-centre - (pad + recenter + scaled offset + half scaled tile)
  const tlx = (cx - wrapR.left)/z - pad - recX - offCSSx*sc - (cssTileW*sc)/2;
  const tly = (cy - wrapR.top)/z  - pad - recY - offCSSy*sc - (cssTileH*sc)/2;
  dragCanvas.style.transform = `translate(${tlx}px, ${tly}px)`;
}

let activePointer = null;
function onPointerDown(e){
  // self-heal: if a prior resolve left the game 'busy' but the anim loop has stopped (no pending
  // anims), it's wedged — recover so a tap un-freezes it instead of the game being dead.
  if (State.busy && rafId === 0 && State.anims.length === 0) recoverFromStuck();
  if (State.phase !== 'play' || State.busy) return;          // GRAVITY: block input during clear/gravity/feed
  const pt = (e.touches ? e.touches[0] : e);
  const loc = toLocal(pt.clientX, pt.clientY);
  const ci = cellAtPoint(loc.x, loc.y);
  if (ci < 0) return;
  const ti = State.cell[ci];
  if (ti == null) return;
  e.preventDefault();
  activePointer = pt.pointerId != null ? pt.pointerId : 0;

  // grab the WHOLE current group of the touched piece
  const group = groupCellsOf(ci);
  const groupSet = new Set(group);
  State.dragging = { originCell: ci, group, groupSet };
  for (const gc of group){ const t = State.tiles[State.cell[gc]]; if (t) t.anim = null; }

  // grab offset: finger relative to the grabbed piece's centre (CSS px)
  const wrapR = document.getElementById('board-wrap').getBoundingClientRect();
  const boardR = boardCanvas.getBoundingClientRect();
  const p = cellXY(ci);
  const tileCenterCSSx = boardR.left + (p.x + p.w/2) * (boardR.width /boardCanvas.width);   // true on-screen centre (host-scale robust)
  const tileCenterCSSy = boardR.top  + (p.y + p.h/2) * (boardR.height/boardCanvas.height);
  State.dragging.grabDX = pt.clientX - tileCenterCSSx;
  State.dragging.grabDY = pt.clientY - tileCenterCSSy;

  lastHover = ci;
  renderDragCanvas();
  dragCanvas.style.display = 'block';
  moveDragCanvas(pt.clientX, pt.clientY);
  drawBoard();          // remove the group from the board (it's now floating)
  haptic('selection');  // GRAB = softest buzz (user req 2026-06-30: pick-up=soft, drop=none, merge=light)
  SFX.resume(); SFX.play('pick', 0.55);   // soft lift cue (resume = gesture safety net for browsers)
}
function onPointerMove(e){
  if (!State.dragging) return;
  const pt = (e.touches ? e.touches[0] : e);
  e.preventDefault();
  moveDragCanvas(pt.clientX, pt.clientY);
  const loc = toLocal(pt.clientX, pt.clientY);
  const ci = cellAtPoint(loc.x, loc.y);
  if (ci !== lastHover){ lastHover = ci; /* no hover art yet */ }
}
function onPointerUp(e){
  if (!State.dragging) return;
  const pt = (e.changedTouches ? e.changedTouches[0] : e);
  e.preventDefault();
  const loc = toLocal(pt.clientX, pt.clientY);
  let target = cellAtPoint(loc.x, loc.y);
  const d = State.dragging;
  const originCell = d.originCell;
  // the pixel offset the floating block currently sits at vs its rest position, so a
  // snap-back / tween starts from where the player sees it.
  const op = cellXY(originCell);
  const cx = pt.clientX - d.grabDX, cy = pt.clientY - d.grabDY;
  const boardR = boardCanvas.getBoundingClientRect();
  const liftDX = ((cx - boardR.left) * (boardCanvas.width /boardR.width)  - op.w/2) - op.x;   // client→backing via live ratio
  const liftDY = ((cy - boardR.top ) * (boardCanvas.height/boardR.height) - op.h/2) - op.y;

  dragCanvas.style.display = 'none';
  State.dragging = null;

  if (target < 0){
    // dropped outside the board → snap the group back to origin
    State.phase = 'swapping';
    returnGroup(d.group, liftDX, liftDY, () => { drawBoard(); });
  } else {
    // full FUSE path: block-swap → recompute bonds → merge/praise (clamps in-bounds)
    resolveMove(originCell, target, liftDX, liftDY);
  }
}

// pointer events (covers mouse + touch); passive:false to allow preventDefault
boardCanvas.addEventListener('pointerdown', onPointerDown, { passive:false });
window.addEventListener('pointermove', onPointerMove, { passive:false });
window.addEventListener('pointerup', onPointerUp, { passive:false });
window.addEventListener('pointercancel', onPointerUp, { passive:false });

// ════════════════════════════════════════════════════════════════════════════
// LEVEL SETUP
// ════════════════════════════════════════════════════════════════════════════
// DATA-DRIVEN LEVEL CURVE — single source for per-level config (grid size, scramble
// seed, picture index). Monotonic difficulty: the grid grows in tiers. An editor /
// JSON level table can later replace this generator without touching the engine.
function levelDef(level){
  const L = Math.max(1, Math.min(MAX_LEVEL, level | 0));
  // grid comes from the DATA TABLE (LEVELS). Gravity levels carry no grid → fall back to 4×4
  // (levelDef isn't used for gravity setup, but keep it well-formed).
  const e = LEVELS[L];
  const cols = (e && e.cols) || 4, rows = (e && e.rows) || 4;
  return { cols, rows, seed: (L * 2654435761 + 12345) >>> 0, image: (L - 1) };
}

function makeScramble(seed){
  // Fisher–Yates with the seeded RNG; reject the identity AND any permutation that leaves a
  // solution-neighbor pair ALREADY correctly adjacent. The puzzle must start fully broken —
  // no pre-fused pieces (they'd give away the picture); every fusion is earned by the player.
  const r = rng(seed);
  const cols = State.cols, rows = State.rows, N = State.N;
  function initialBonds(p){
    let n = 0;
    for (let ci=0; ci<N; ci++){
      const col = ci % cols, row = (ci / cols) | 0, a = p[ci];
      if (col < cols-1){ const b = p[ci+1];    if (homeRowOf(b)===homeRowOf(a) && homeColOf(b)===homeColOf(a)+1) n++; }
      if (row < rows-1){ const b = p[ci+cols]; if (homeColOf(b)===homeColOf(a) && homeRowOf(b)===homeRowOf(a)+1) n++; }
    }
    return n;
  }
  let perm, best = null, bestBonds = Infinity;
  for (let attempt=0; attempt<400; attempt++){
    perm = Array.from({length: N}, (_,i)=>i);
    for (let i=perm.length-1;i>0;i--){ const j=(r()*(i+1))|0; [perm[i],perm[j]]=[perm[j],perm[i]]; }
    if (perm.every((v,i)=>v===i)) continue;               // identity → retry
    const bonds = initialBonds(perm);
    if (bonds === 0) return perm;                          // no pre-fused pieces → perfect
    if (bonds < bestBonds){ bestBonds = bonds; best = perm.slice(); }
  }
  return best || perm;                                     // fallback: fewest initial bonds found
}

// ════════════════════════════════════════════════════════════════════════════
// GRAVITY board build. 4 cols. PLAY_PICS pictures' tiles are scrambled into the play
// area (no picture pre-completed); DECK_PICS more are queued face-down in the deck.
// Each picture = one PUZZLE_SRCS photo, cut 2×2 (cycled across pictures). Reuses the
// shared layout/cardBack/drawBoard/SFX; the intro is a deal-in + reveal of play tiles.
// ════════════════════════════════════════════════════════════════════════════
function setupGravity(level){
  State.level = level;
  State.cols = GRAV.COLS; State.rows = GRAV.PLAY_ROWS; State.N = State.cols * State.rows;
  State.seed = (level * 2654435761 + 999) >>> 0;
  State.gridConverge = 0; State.fx = null; State.anims.length = 0; State.dragging = null;
  State.phase = 'boot'; State.busy = false;
  State.hints = STAGE_FLOW ? Wallet.hints : CFG.HINTS; updateHintBadge();   // gravity now HAS hints (user req: hint button on every stage)
  if (btnHintEl) btnHintEl.style.visibility = 'visible';
  showCoinHud(false);                        // hide held-coin HUD during play (shown again on the result screen)
  levelNumEl.textContent = String(level);
  overlay.style.display = 'none';
  { const hud = document.getElementById('hud-top'); if (hud) hud.style.opacity = '1'; }   // restore HUD for the new level/stage
  boardCanvas.classList.remove('complete');
  banner.style.transform = 'translateY(-44px) scale(.7)'; banner.style.opacity = '0';
  rewardEl.style.transform = 'translate(-50%,-100%) scale(.4)'; rewardEl.style.opacity = '0';
  nextBtn.style.transform = 'translateY(18px) scale(.9)'; nextBtn.style.opacity = '0';
  if (praiseRaf) { cancelAnimationFrame(praiseRaf); praiseRaf = 0; } praiseEl.style.opacity = '0';

  const r = rng(State.seed);
  const playPics = GRAV.PLAY_PICS, deckPics = (levelEntry(level).deckPics ?? GRAV.DECK_PICS); // ramps 2→5 by level
  State.totalPics = playPics + deckPics;
  State.clearedPics = 0;
  State.clearedList = [];                     // fresh montage source for this stage
  stopMontage();                              // defensive: kill any leftover loop from a prior stage
  State.picImg = []; State.picSrcIdx = [];
  if (STAGE_FLOW){
    // play link: each picture = a UNIQUE photo from GRAV_POOL, offset by this stage's poolStart so
    // NEAR gravity stages never share a photo (USER REQ 2026-06-27). Loaded on demand + cached.
    const start = (levelEntry(level).poolStart ?? 0);
    for (let pid=0; pid<State.totalPics; pid++){
      const srcIdx = (start + pid) % GRAV_POOL.length;       // contiguous block → distinct within the stage
      State.picSrcIdx[pid] = srcIdx;
      State.picImg[pid] = gravPoolImages[srcIdx] || null;
      if (!gravPoolImages[srcIdx]){
        const im = new Image(), cap = srcIdx;
        im.decoding = 'async';   // off-main-thread decode hint (webview perf)
        im.onload = () => { gravPoolImages[cap] = im; let touched=false;
          for (let q=0;q<State.picSrcIdx.length;q++){ if (State.picSrcIdx[q]===cap && !State.picImg[q]){ State.picImg[q]=im; touched=true; } }
          if (touched) drawBoard(); };
        im.onerror = () => {};                                // keep the solid-tint fallback until the photo lands
        im.src = GRAV_POOL[srcIdx];
      }
    }
  } else {
    // reels/host build: keep the shared inlined PUZZLE_SRCS pool (shuffled distinct per board).
    const nSrc = PUZZLE_SRCS.length;
    const srcOrder = Array.from({length: nSrc}, (_,i)=>i);
    for (let i=srcOrder.length-1;i>0;i--){ const j=(r()*(i+1))|0; [srcOrder[i],srcOrder[j]]=[srcOrder[j],srcOrder[i]]; }
    for (let pid=0; pid<State.totalPics; pid++){ const srcIdx = srcOrder[pid % nSrc]; State.picSrcIdx[pid] = srcIdx; State.picImg[pid] = (puzzleImages[srcIdx] || null); }
  }

  // ── PLAY tiles: playPics × 4 = the play-area tiles, scrambled so NO picture is
  // pre-completed. Fisher–Yates over (picId,sub) tiles into play cells; reject any
  // permutation that leaves a full picture already correctly assembled. ──
  State.tiles = [];
  const playTiles = [];                                      // {picId, sub}
  for (let pid=0; pid<playPics; pid++) for (let s=0;s<4;s++) playTiles.push({ picId: pid, sub: s });
  // (playPics*4) must equal play cells. PLAY_PICS*4 == COLS*PLAY_ROWS guaranteed below.
  let placement = null;
  for (let attempt=0; attempt<600; attempt++){
    const perm = playTiles.slice();
    for (let i=perm.length-1;i>0;i--){ const j=(r()*(i+1))|0; [perm[i],perm[j]]=[perm[j],perm[i]]; }
    // build a trial cell map (tile slot index per cell), then test for any complete picture
    const trialTiles = perm.map((p,i)=>({ home:i, picId:p.picId, sub:p.sub, faceUp:false, reveal:0, anim:null }));
    if (!gravHasCompletePicture(trialTiles)) { placement = trialTiles; break; }
    if (attempt === 599) placement = trialTiles;            // fallback (extremely unlikely)
  }
  State.tiles = placement;
  State.cell = placement.map((_,i)=>i);                     // cell[ci] = tile slot ci (1:1 from the shuffle)

  // ── DECK: deckPics × 4 = 12 face-down cards distributed across the 4 columns. Each
  // column's deck is a stack (queue); the NEXT card to feed is the stack END (lowest). ──
  State.deck = Array.from({length: State.cols}, ()=>[]);
  // DECK ORDER (USER REQ 2026-06-27 "deep deck, avoid deadlock"): align each deck picture's 4 subs at
  // the SAME depth across the 4 columns, so feeding a "row" surfaces a COMPLETE picture together →
  // far fewer deadlocks even with deep (up to 10) decks. Picture order + which-sub→which-column are
  // seed-randomized. The auto-reshuffle stays as the hard clearability guarantee.
  const deckPids = [];
  for (let pid=playPics; pid<State.totalPics; pid++) deckPids.push(pid);
  for (let i=deckPids.length-1;i>0;i--){ const j=(r()*(i+1))|0; [deckPids[i],deckPids[j]]=[deckPids[j],deckPids[i]]; }
  for (const pid of deckPids){
    const subCol = [0,1,2,3];
    for (let i=subCol.length-1;i>0;i--){ const j=(r()*(i+1))|0; [subCol[i],subCol[j]]=[subCol[j],subCol[i]]; }
    for (let c=0;c<State.cols;c++) State.deck[c].push({ picId: pid, sub: subCol[c], tileIdx: -1 });
  }

  State.bondH = new Array(State.N).fill(0);
  State.bondV = new Array(State.N).fill(0);
  layout();
  State.cardBack = buildCardBack(State.tileW, State.tileH);
  invalidateStaticCache();
  syncBondProgress();
  drawBoard();

  // intro: deal-in the play tiles (face-down) → reveal (face-up scrambled) → play.
  dealIn(() => { reveal(() => { State.phase = 'play'; }); });
}
// test if a candidate tiles[] array (cell index === slot index, full COLS×PLAY_ROWS play
// grid) contains any complete 2×2 picture (used to reject pre-completed scrambles).
function gravHasCompletePicture(tiles){
  const cols = State.cols, rows = State.rows;
  for (let row=0; row<rows-1; row++) for (let c=0;c<cols-1;c++){
    const tl=row*cols+c, tr=tl+1, bl=tl+cols, br=bl+1;
    const A=tiles[tl],B=tiles[tr],D=tiles[bl],E=tiles[br];
    if (!A||!B||!D||!E) continue;
    if (A.picId===B.picId && A.picId===D.picId && A.picId===E.picId &&
        A.sub===0 && B.sub===1 && D.sub===2 && E.sub===3) return true;
  }
  return false;
}

function setupLevel(level){
  if (IS_GRAVITY) { setupGravity(level); return; }
  stopMontage();                             // defensive: no montage in single mode
  const def = levelDef(level);               // data-driven: grid size + seed + picture
  State.level = level;
  State.cols = def.cols; State.rows = def.rows; State.N = def.cols * def.rows;
  State.seed = def.seed;
  State.gridConverge = 0;
  State.fx = null;
  State.anims.length = 0;
  State.dragging = null;
  State.phase = 'boot';
  // STAGE_FLOW: hints PERSIST across levels (wallet). Reels build keeps per-level refill (CFG.HINTS).
  State.hints = STAGE_FLOW ? Wallet.hints : CFG.HINTS; updateHintBadge();
  if (STAGE_FLOW && btnHintEl) btnHintEl.style.visibility = 'visible';   // single is never hidden (gravity hides it)
  showCoinHud(false);                        // hide held-coin HUD during play (shown again on the result screen)
  levelNumEl.textContent = String(level);
  overlay.style.display = 'none';
  { const hud = document.getElementById('hud-top'); if (hud) hud.style.opacity = '1'; }   // restore HUD for the new level/stage
  // un-frame the board for the new level. CRITICAL: the .complete frame is a `transform:scale(.74)`
  // with a .45s transition; removing the class starts a .45s reverse animation. layout() runs right
  // after (below) and reads getBoundingClientRect() MID-TRANSITION → State.fxOff (the #popfx fuse/glow
  // overlay origin) gets computed from the SHRUNK rect and stays wrong for the whole stage, so every
  // stage AFTER the first had its place/merge visuals offset down-right (user-reported). Kill the
  // transition + force a reflow so the transform snaps back to none BEFORE layout() measures.
  boardCanvas.style.transition = 'none';
  boardCanvas.classList.remove('complete');
  void boardCanvas.offsetWidth;                 // flush: apply the transform reset now
  requestAnimationFrame(() => { boardCanvas.style.transition = ''; });   // restore the smooth zoom for the next completion
  banner.style.transform = 'translateY(-44px) scale(.7)'; banner.style.opacity = '0';
  rewardEl.style.transform = 'translate(-50%,-100%) scale(.4)'; rewardEl.style.opacity = '0';
  nextBtn.style.transform = 'translateY(18px) scale(.9)'; nextBtn.style.opacity = '0';
  if (praiseRaf) { cancelAnimationFrame(praiseRaf); praiseRaf = 0; } praiseEl.style.opacity = '0';

  // picture: STAGE_FLOW (play link) → this stage's UNIQUE photo (sg###), loaded on demand + cached;
  // reels/host build → the inlined PUZZLE_SRCS pool. Procedural placeholder shows until the photo loads.
  if (STAGE_FLOW){
    const pIdx = singlePhotoIdx(level);
    State.puzzleImg = singleCache[pIdx] || buildPuzzleImage(def.image);
    if (!singleCache[pIdx]){
      const im = new Image();
      im.decoding = 'async';   // off-main-thread decode hint (webview perf)
      im.onload = () => { singleCache[pIdx] = im; if (State.level === level && !IS_GRAVITY){ State.puzzleImg = im; drawBoard(); } };
      im.onerror = () => {};   // keep the procedural fallback on failure (photo not generated yet)
      im.src = SINGLE_SRCS[pIdx];
    }
  } else {
    const imgIdx = imageIndexForLevel(level);
    State.puzzleImg = puzzleImages[imgIdx] || buildPuzzleImage(def.image);
  }

  // tiles: tiles[ti] has home = ti (its correct cell). cell[ci] = which tile sits there.
  State.tiles = Array.from({length: State.N}, (_,ti)=>({ home: ti, faceUp:false, reveal:0, anim:null }));
  const perm = makeScramble(def.seed);       // perm[ci] = home index of tile in cell ci
  State.cell = perm.slice();                 // cell[ci] = tile index whose home === perm[ci]
  // NOTE: tile index === home index, so cell[ci] = perm[ci] directly.

  // FUSE: per-edge bond progress arrays (sized to the grid). The scramble may leave
  // incidental solution-neighbors adjacent → those seams start already-bonded (=1) so
  // any pre-existing fused pair renders seamless from the reveal.
  State.bondH = new Array(State.N).fill(0);
  State.bondV = new Array(State.N).fill(0);
  syncBondProgress();

  layout();                                   // sizes tiles + builds card-back below
  State.cardBack = buildCardBack(State.tileW, State.tileH);
  invalidateStaticCache();

  // run the intro: deal-in (face-down) → reveal (scrambled) → play
  drawBoard();
  dealIn(() => {
    reveal(() => { State.phase = 'play'; tutMaybeStart(); });   // stage-1 onboarding (first play only)
  });
}

// ── boot ─────────────────────────────────────────────────────────────────────
// Stage 1 (single) boots a 4×4 picture; Stage 2 (gravity) boots its multi-picture board.
let currentLevel = STAGE_FLOW ? STAGE : (RT.from || 1);   // standalone: walk the 100-level table by ?stage
let __lastVW = window.innerWidth, __lastVH = window.innerHeight;
window.addEventListener('resize', () => {
  // iOS WebView JITTERS innerHeight (dynamic viewport / 100dvh) DURING animations. Re-fitting the
  // board on that jitter makes the grid visibly JUMP mid-merge (user-reported, esp. on bigger grids).
  // So: ignore small height-ONLY changes; relayout only on a width change (orientation) or a large
  // (>120px) height change. The board is portrait/width-constrained, so a small dvh wobble doesn't
  // actually need a re-fit.
  const vw = window.innerWidth, vh = window.innerHeight;
  if (vw === __lastVW && Math.abs(vh - __lastVH) < 120) return;
  __lastVW = vw; __lastVH = vh;
  // re-layout but don't restart the level; rebuild card-back for new tile size
  layout();
  if (State.tileW) State.cardBack = buildCardBack(State.tileW, State.tileH);
  invalidateStaticCache();
  drawBoard();
  placeReward();   // keep the earned-coin pill straddling the (possibly re-sized) photo edge
});

nextBtn.addEventListener('click', () => {
  stopMontage();                               // dismiss the result-screen montage loop
  if (STAGE_FLOW) {
    // Walk the 100-level table 1→100 (loop to 1 after the last). Each level reloads into its own
    // page load so its mode (single/gravity) boots cleanly — avoids a mid-session mode swap.
    location.search = '?stage=' + (STAGE + 1 > MAX_LEVEL ? 1 : STAGE + 1);
    return;
  }
  currentLevel += 1;
  setupLevel(currentLevel);
  if (GR.active){ GR.gameStart(); try { GR.gameState(grSnapshot()); } catch (e) {} }   // re-signal start + save progress to host
});

// ── HINT: tap the bulb → auto-place one out-of-place piece into its home cell (it fuses
// with any correct neighbors), consuming a charge. Prefers a SINGLETON whose placement bonds
// the most (most satisfying); disables at 0 charges. ──────────────────────────────────────────
function updateHintBadge(){
  if (!hintBadgeEl) return;
  // STAGE_FLOW single mode: at 0 hints show a red "+" badge and keep the bulb fully visible/tappable
  // (tapping it opens the hint shop). Reels build keeps the old behaviour (hide badge + dim at 0).
  if (STAGE_FLOW && !IS_GRAVITY && State.hints <= 0){
    hintBadgeEl.textContent = '';            // image badge (centered "+"); no text glyph
    hintBadgeEl.classList.add('plus');
    hintBadgeEl.style.display = '';
    if (btnHintEl) btnHintEl.style.opacity = '1';
    return;
  }
  hintBadgeEl.classList.remove('plus');
  hintBadgeEl.textContent = String(State.hints);
  hintBadgeEl.style.display = State.hints > 0 ? '' : 'none';
  if (btnHintEl) btnHintEl.style.opacity = State.hints > 0 ? '1' : '0.45';
}
// GRAVITY hint: find a move (src→target) that brings two matching sub-pieces adjacent so a NEW bond
// forms. Runs the SAME resolveMove() path the player uses (so it can't break gravity). Sub layout:
// 0=TL,1=TR,2=BL,3=BR → right-bond pairs (left 0/2 + right +1); below-bond pairs (top 0/1 + below +2).
function gravityHintMove(){
  const cols = State.cols, rows = State.rows, N = State.N;
  const single = (c) => c>=0 && c<N && State.cell[c]!=null && groupCellsOf(c).length===1;
  const emptyOrSingle = (c) => c>=0 && c<N && (State.cell[c]==null || groupCellsOf(c).length===1);
  const findSub = (picId, sub, exclude) => {
    for (let c=0;c<N;c++){ if (c===exclude) continue; const t=State.cell[c];
      if (t!=null && single(c) && State.tiles[t].picId===picId && State.tiles[t].sub===sub) return c; }
    return -1;
  };
  for (let cb=0; cb<N; cb++){
    const tb = State.cell[cb]; if (tb==null) continue;
    const B = State.tiles[tb], col = cb % cols, row = (cb/cols)|0;
    if (col < cols-1 && (B.sub===0 || B.sub===2)){          // attach partner to B's RIGHT
      const target = cb+1, rt = State.cell[target];
      const already = rt!=null && State.tiles[rt].picId===B.picId && State.tiles[rt].sub===B.sub+1;
      if (!already && emptyOrSingle(target)){ const src = findSub(B.picId, B.sub+1, target); if (src>=0 && src!==cb) return { src, target }; }
    }
    if (row < rows-1 && (B.sub===0 || B.sub===1)){          // attach partner BELOW B
      const target = cb+cols, bt = State.cell[target];
      const already = bt!=null && State.tiles[bt].picId===B.picId && State.tiles[bt].sub===B.sub+2;
      if (!already && emptyOrSingle(target)){ const src = findSub(B.picId, B.sub+2, target); if (src>=0 && src!==cb) return { src, target }; }
    }
  }
  return null;
}
function useHint(){
  if (State.phase !== 'play' || State.hints <= 0 || State.busy) return;
  if (IS_GRAVITY){                                            // gravity: place a piece to FORM A BOND (same move path as the player)
    const mv = gravityHintMove();
    if (!mv) return;                                          // no helpful bond move available → don't spend a charge
    State.hints--;
    if (STAGE_FLOW){ Wallet.hints = State.hints; saveWallet(); }
    updateHintBadge(); haptic('selection'); SFX.resume();
    resolveMove(mv.src, mv.target);
    return;
  }
  let pick = -1, best = -1;
  for (let ci = 0; ci < State.N; ci++){
    const ti = State.cell[ci];
    if (ti == null || State.tiles[ti].home === ci) continue;   // already home
    if (groupCellsOf(ci).length !== 1) continue;               // singleton → lands exactly home (no clamp)
    const home = State.tiles[ti].home, hc = home % State.cols, hr = home / State.cols | 0;
    let pot = 0;                                                // home-neighbors already correct → bonds formed
    if (hc > 0            && State.cell[home-1]          === home-1)          pot++;
    if (hc < State.cols-1 && State.cell[home+1]          === home+1)          pot++;
    if (hr > 0            && State.cell[home-State.cols] === home-State.cols) pot++;
    if (hr < State.rows-1 && State.cell[home+State.cols] === home+State.cols) pot++;
    if (pot > best){ best = pot; pick = ci; }
  }
  if (pick < 0){                                               // fallback: any out-of-place piece
    for (let ci = 0; ci < State.N; ci++){ const ti = State.cell[ci]; if (ti != null && State.tiles[ti].home !== ci){ pick = ci; break; } }
  }
  if (pick < 0) return;                                         // already solved
  const ti = State.cell[pick], home = State.tiles[ti].home;
  State.hints--;
  if (STAGE_FLOW){ Wallet.hints = State.hints; saveWallet(); }   // hints persist across levels
  updateHintBadge();
  haptic('selection'); SFX.resume();
  resolveMove(pick, home);                                      // bring this piece home (group comes along, fuses)
}

// ════════════════════════════════════════════════════════════════════════════
// STAGE-1 ONBOARDING TUTORIAL — "guided first move" (mobile-puzzle standard).
// Runs ONLY on stage 1, the FIRST time ever (localStorage 'pp_tut_s1'), then never.
//   A (goal): centered "Complete the picture!" ~1.5s
//   B (guided move): pulsing ring on one tile + a hand looping a drag toward its home,
//     bottom text "Drag the piece into place 👆". Overlay is non-blocking → the player
//     drags freely. tutOnMove() (any REAL move) advances to C.
//   C (done): "Nice! Matching pieces snap together ✨ Now finish it yourself!" ~2.2s → remove + mark seen.
// Works in BOTH builds: the standalone play-link AND the reels build (GR.active, no page
// reload between stages). The reels-lean class only hides the hint button, not this overlay.
// ════════════════════════════════════════════════════════════════════════════
const TUT = { active:false, step:0, timer:0, geomRaf:0, src:-1, home:-1 };
const tutEl = {
  root: document.getElementById('pp-tut'),
  ring: document.getElementById('pp-tut-ring'),
  hand: document.getElementById('pp-tut-hand'),
  text: document.getElementById('pp-tut-text'),
};
// pick the most-helpful out-of-place SINGLETON cell (same heuristic as useHint).
function tutPickMove(){
  let pick = -1, best = -1;
  for (let ci = 0; ci < State.N; ci++){
    const ti = State.cell[ci];
    if (ti == null || State.tiles[ti].home === ci) continue;       // already home
    if (groupCellsOf(ci).length !== 1) continue;                   // singleton → lands exactly home
    const home = State.tiles[ti].home, hc = home % State.cols, hr = home / State.cols | 0;
    let pot = 0;
    if (hc > 0            && State.cell[home-1]          === home-1)          pot++;
    if (hc < State.cols-1 && State.cell[home+1]          === home+1)          pot++;
    if (hr > 0            && State.cell[home-State.cols] === home-State.cols) pot++;
    if (hr < State.rows-1 && State.cell[home+State.cols] === home+State.cols) pot++;
    if (pot > best){ best = pot; pick = ci; }
  }
  if (pick < 0){                                                   // fallback: first out-of-place cell
    for (let ci = 0; ci < State.N; ci++){ const ti = State.cell[ci]; if (ti != null && State.tiles[ti].home !== ci){ pick = ci; break; } }
  }
  if (pick < 0) return null;
  return { src: pick, home: State.tiles[State.cell[pick]].home };
}
// cell index → CSS-px rect relative to #stage. Uses the LIVE bounding-rect RATIO (never a
// hardcoded DPR) — the same basis that fixed a prior reels offset bug.
function tutCellRectCSS(ci){
  const stageR = document.getElementById('stage').getBoundingClientRect();
  const br = boardCanvas.getBoundingClientRect();
  const sx = br.width / boardCanvas.width, sy = br.height / boardCanvas.height;
  const p = cellXY(ci);
  return { x:(br.left-stageR.left)+p.x*sx, y:(br.top-stageR.top)+p.y*sy, w:p.w*sx, h:p.h*sy };
}
// (re)position the ring over the source cell + set the hand's drag path CSS vars. Re-run on
// rAF while step B is up so a resize/host re-fit keeps the ring/hand aligned to the board.
function tutPlaceGuide(){
  if (TUT.src < 0 || TUT.home < 0) return;
  const a = tutCellRectCSS(TUT.src), b = tutCellRectCSS(TUT.home);
  tutEl.ring.style.left = a.x + 'px'; tutEl.ring.style.top = a.y + 'px';
  tutEl.ring.style.width = a.w + 'px'; tutEl.ring.style.height = a.h + 'px';
  const x0 = a.x + a.w/2, y0 = a.y + a.h/2, x1 = b.x + b.w/2, y1 = b.y + b.h/2;
  tutEl.hand.style.setProperty('--x0', x0 + 'px'); tutEl.hand.style.setProperty('--y0', y0 + 'px');
  tutEl.hand.style.setProperty('--x1', x1 + 'px'); tutEl.hand.style.setProperty('--y1', y1 + 'px');
}
function tutGeomLoop(){
  if (!TUT.active || TUT.step !== 2){ TUT.geomRaf = 0; return; }
  tutPlaceGuide();
  TUT.geomRaf = requestAnimationFrame(tutGeomLoop);
}
function tutSetText(msg, centered){
  tutEl.text.textContent = msg;
  tutEl.text.classList.toggle('center', !!centered);
  tutEl.text.classList.add('show');
}
function tutClearTimer(){ if (TUT.timer){ clearTimeout(TUT.timer); TUT.timer = 0; } }
function tutMaybeStart(){
  if (TUT.active) return;
  if (!(State.level === 1 && !IS_GRAVITY && lsGet('pp_tut_s1') !== '1')) return;
  TUT.active = true; TUT.step = 1;
  tutEl.root.classList.add('on');
  // Step A — goal text (~1.5s)
  tutSetText('Complete the picture!', true);
  tutClearTimer();
  TUT.timer = setTimeout(tutStepB, 1500);
}
function tutStepB(){
  if (!TUT.active) return;
  const mv = tutPickMove();
  if (!mv){ tutFinishSeen(); return; }                 // nothing to teach (already solved) → just mark seen
  TUT.step = 2; TUT.src = mv.src; TUT.home = mv.home;
  tutEl.text.classList.remove('center');
  tutSetText('Drag the piece into place 👆', false);
  tutPlaceGuide();
  tutEl.ring.classList.add('show');
  tutEl.hand.classList.add('show');
  if (!TUT.geomRaf) TUT.geomRaf = requestAnimationFrame(tutGeomLoop);   // keep aligned across resizes
}

    currency: { coins: Wallet.coins|0 }, items: { hints: Wallet.hints|0 } };

// WATCHDOG (gravity only): a completed 2×2 picture must NEVER sit on the board unresolved. If any
// path ever fails to trigger the clear→win resolve, this catches a stuck completed picture while the
// board is idle and runs it. Idle-guarded (play phase, not busy, no anims, not dragging) so it can
// only fire on a genuine stuck state — in normal play a completed picture is cleared within the move.
if (IS_GRAVITY){
  setInterval(() => {
    if (State.phase === 'play' && !State.busy && State.anims.length === 0 && !State.dragging && findCompletePicture()){
      State.busy = true; State.phase = 'swapping'; gravityResolveAfterMove();
    }
  }, 400);
}

// ── headless QA hooks (only meaningful for the self-test; harmless otherwise) ──
window.__PP = {
  get phase(){ return State.phase; },

  get N(){ return State.N; },
  get cols(){ return State.cols; },
  get rows(){ return State.rows; },

  // ── wallet/economy test hooks (STAGE_FLOW) ──
  get coins(){ return Wallet.coins; },
  get hints(){ return State.hints; },
  get walletHints(){ return Wallet.hints; },
  // set coins/hints for testing (persists to localStorage + refreshes badge/HUD)

    if (c != null){ Wallet.coins = c|0; }

  // load a real picture as the current puzzle image (preview/art-pipeline hook).

  loadPuzzleImage(src){ return new Promise((res) => {
    const im = new Image();
    im.onload = () => { State.puzzleImg = im; invalidateStaticCache(); drawBoard(); res(true); };
    im.onerror = () => res(false);
    im.src = src;
  }); },
  // force a solved board + run the completion sequence (test hook)
  forceComplete(){
    if (IS_GRAVITY){
      // gravity win = empty everything + mark all cleared, then run the result screen.
      State.cell = new Array(State.N).fill(null);
      State.deck = Array.from({length: State.cols}, ()=>[]);
      State.clearedPics = State.totalPics;
      State.phase = 'play'; State.busy = false;
      drawBoard(); onComplete(); return;
    }
    State.cell = Array.from({length: State.N}, (_,i)=>i);
    State.tiles.forEach(t => { t.anim = null; t.faceUp = true; t.reveal = 1; });
    syncBondProgress();                         // solved board → all seams bonded (=1) → seamless
    State.phase = 'play';
    drawBoard();
    onComplete();
  },
  // programmatic MOVE (test hook): grab the group at originCell, block-swap so it lands
  // on targetCell, recompute bonds, merge/praise — exactly the real pointer-up path.
  move(originCell, targetCell){ if (State.phase !== 'play') return false; return resolveMove(originCell, targetCell, 0, 0); },
  // CAPTURE warm-up hook (marketing): bake one throwaway glow sprite NOW so the first real merge's
  // shadowBlur-bake + GPU texture upload (a one-time cold-start spike that dropped ~5 frames on the
  // very first merge) happens during the static scramble hold instead of mid-bounce. Pure offscreen
  // work + discard — no board/render state change. Returns true if it baked.
  _warmGlow(){
    try {
      // Warm a RANGE of block sizes/shapes: the first time a merge of a given silhouette size occurs, its
      // freshly-baked glow sprite needs a one-time GPU texture upload that spiked early kitten merges
      // (group merges = bigger sprites). Baking representative shapes (singleton, pair, row, 2×2, 2×3)
      // here — during the static hold — lands ALL those cold uploads off the critical path. Offscreen +
      // discard: no board/render state change. Returns the count of shapes warmed.
      const cols = State.cols, rows = State.rows, N = State.N;
      const shapes = [];
      const cell = (c,r)=> r*cols + c;
      shapes.push([cell(0,0)]);                                                   // 1
      if (cols>=2) shapes.push([cell(0,0),cell(1,0)]);                            // 1×2 row pair
      if (rows>=2) shapes.push([cell(0,0),cell(0,1)]);                            // 2×1 col pair
      if (cols>=3) shapes.push([cell(0,0),cell(1,0),cell(2,0)]);                  // 1×3 row
      if (cols>=2&&rows>=2) shapes.push([cell(0,0),cell(1,0),cell(0,1),cell(1,1)]);// 2×2
      if (cols>=3&&rows>=2) shapes.push([cell(0,0),cell(1,0),cell(2,0),cell(0,1),cell(1,1),cell(2,1)]); // 2×3
      let warmed = 0;
      for (const cells of shapes){
        if (cells.some(c=>c>=N)) continue;
        const fx = { cells, glow: 1, scale: 1, pivot: cellXY(cells[0]), _glowC: null };
        if (buildGlowSprite(fx)) warmed++;
        fx._glowC = null;   // discard — real merges build their own; this only warms the bake+upload path
      }
      return warmed;
    } catch(_) { return 0; }
  },
  // CAPTURE hook (marketing): place ONE out-of-place piece into its home (fuse glow), like a hint
  // but with no hint-count limit — call repeatedly to assemble the photo for recording. false = solved/busy.
  _solveStep(){
    if (State.phase !== 'play') return false;
    let pick=-1, best=-1;
    for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti==null||State.tiles[ti].home===ci) continue; if (groupCellsOf(ci).length!==1) continue;
      const home=State.tiles[ti].home, hc=home%State.cols, hr=home/State.cols|0; let pot=0;
      if (hc>0&&State.cell[home-1]===home-1) pot++; if (hc<State.cols-1&&State.cell[home+1]===home+1) pot++;
      if (hr>0&&State.cell[home-State.cols]===home-State.cols) pot++; if (hr<State.rows-1&&State.cell[home+State.cols]===home+State.cols) pot++;
      if (pot>best){ best=pot; pick=ci; } }
    if (pick<0){ for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti!=null&&State.tiles[ti].home!==ci){ pick=ci; break; } } }
    if (pick<0) return false;
    const ti=State.cell[pick], home=State.tiles[ti].home;
    SFX.resume(); resolveMove(pick, home); return true;
  },
  // CAPTURE hook: place a RANDOM out-of-place singleton into its home (even, scattered fill — so the
  // assembled picture doesn't finish biased to one corner). Returns false when solved.
  _solveStepRandom(){
    if (State.phase !== 'play') return false;
    const cands=[];
    for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti==null||State.tiles[ti].home===ci) continue; if (groupCellsOf(ci).length!==1) continue; cands.push(ci); }
    if (!cands.length){ for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti!=null&&State.tiles[ti].home!==ci){ cands.push(ci); break; } } }
    if (!cands.length) return false;
    const pick=cands[(Math.random()*cands.length)|0];
    const ti=State.cell[pick], home=State.tiles[ti].home;
    SFX.resume(); resolveMove(pick, home); return true;
  },
  // cells in the current group (4-connected bonded component) of the piece at ci
  groupOf(ci){ return groupCellsOf(ci); },
  // DEBUG (capture): per-cell {cell, tile, home, grp} so the harness can see what's out-of-place/grouped
  _cellHomes(){ const out=[]; for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci];
    out.push(ti==null?{c:ci,t:null}:{c:ci,t:ti,home:State.tiles[ti].home,grp:groupCellsOf(ci).length}); } return out; },
  // CAPTURE hook (marketing "piece-in-hand pondering"): pick an out-of-place singleton to DRAG, its
  // correct HOME cell, and a couple of DECOY cells (wrong but plausible spots) to hover over with a
  // pause before placing — so a real pointer-drag can show deliberation. Returns null if none.
  _pickDragMove(){
    if (State.phase !== 'play') return null;
    const cands=[];
    for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti==null||State.tiles[ti].home===ci) continue; if (groupCellsOf(ci).length!==1) continue; cands.push(ci); }
    if (!cands.length) return null;
    const from=cands[(Math.random()*cands.length)|0];
    const home=State.tiles[State.cell[from]].home;
    // decoys: a few other occupied cells that are NOT home and NOT from (somewhere to hover, "is it here?")
    const others=[]; for (let ci=0; ci<State.N; ci++){ if (ci!==from && ci!==home && State.cell[ci]!=null) others.push(ci); }
    const decoys=[]; for (let k=0;k<2 && others.length;k++){ decoys.push(others.splice((Math.random()*others.length)|0,1)[0]); }
    return { from, home, decoys };
  },
  // CAPTURE hook (marketing hand-drag): pick the out-of-place singleton whose HOME cell already has the
  // MOST correctly-placed neighbours, so dragging it home visibly FUSES (forms ≥1 new bond → a synced
  // paper-snap). Same {from,home,decoys} shape. Returns null only when nothing is draggable. This keeps
  // the assembly satisfying (steady merges) while still being a real hand-drag of every piece.
  _pickDragBond(){
    if (State.phase !== 'play') return null;
    const cols=State.cols, rows=State.rows;
    const homeCorrect=(ci)=>{ const t=State.cell[ci]; return t!=null && State.tiles[t].home===ci; };
    let pick=-1, best=-2;
    for (let ci=0; ci<State.N; ci++){
      const ti=State.cell[ci]; if (ti==null || State.tiles[ti].home===ci) continue;   // skip empty / already-home
      if (groupCellsOf(ci).length!==1) continue;                                       // only free singletons
      const home=State.tiles[ti].home, hc=home%cols, hr=home/cols|0; let pot=0;
      if (hc>0        && homeCorrect(home-1))    pot++;
      if (hc<cols-1   && homeCorrect(home+1))    pot++;
      if (hr>0        && homeCorrect(home-cols)) pot++;
      if (hr<rows-1   && homeCorrect(home+cols)) pot++;
      if (pot>best){ best=pot; pick=ci; }
    }
    if (pick<0) return null;
    const home=State.tiles[State.cell[pick]].home;
    const others=[]; for (let ci=0; ci<State.N; ci++){ if (ci!==pick && ci!==home && State.cell[ci]!=null && !homeCorrect(ci)) others.push(ci); }
    const decoys=[]; for (let k=0;k<2 && others.length;k++){ decoys.push(others.splice((Math.random()*others.length)|0,1)[0]); }
    return { from: pick, home, decoys, pot: best };
  },
  // CAPTURE hook (marketing hand-drag — GROUP-AWARE completion): like _pickDragBond but ALSO handles
  // out-of-place GROUPS (pieces that fused in the WRONG location). Returns a {from, home} where dragging
  // the piece at `from` (and its whole group) so `from` lands on `home` advances the solve. Guarantees a
  // hand-drag is always available until truly complete (so the capture never has to force-jump). The
  // `target` it returns is the CELL the dragged piece should land on (= its own home), clamped by the
  // engine. Returns null only when the board is solved.
  _pickDragAny(){
    if (State.phase !== 'play') return null;
    // 1) prefer a bond-forming singleton (steady satisfying merges)
    const sb = this._pickDragBond(); if (sb) return sb;
    // 2) otherwise drag an out-of-place GROUP: pick the largest out-of-place group, grab one of its pieces
    //    and target that piece's OWN home → the whole group translates toward correctness (real engine path).
    let bestGroup=null, bestSize=0;
    const seen=new Set();
    for (let ci=0; ci<State.N; ci++){
      if (seen.has(ci)) continue;
      const ti=State.cell[ci]; if (ti==null) continue;
      const g=groupCellsOf(ci); for (const c of g) seen.add(c);
      const outOfPlace = g.some((c)=>State.tiles[State.cell[c]].home!==c);
      if (outOfPlace && g.length>bestSize){ bestSize=g.length; bestGroup=g; }
    }
    if (!bestGroup) return null;
    // grab the group piece that is FARTHEST from its home (its move advances the most), target = its home
    let from=bestGroup[0], home=State.tiles[State.cell[from]].home, far=-1;
    for (const c of bestGroup){ const h=State.tiles[State.cell[c]].home;
      const d=Math.abs((c%State.cols)-(h%State.cols))+Math.abs(((c/State.cols)|0)-((h/State.cols)|0));
      if (d>far){ far=d; from=c; home=h; } }
    return { from, home, decoys: [], pot: 0, group: true };
  },
  // CAPTURE hook (marketing tempo): how many pieces currently sit in their HOME cell (correctly placed).
  // Drives the human-tempo ramp: progress p = placedCount / N.
  placedCount(){ let n=0; for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti!=null && State.tiles[ti].home===ci) n++; } return n; },
  // number of bonded seams currently on the board
  bondCount,
  // client (CSS px) centre of a cell — for real-pointer-drag tests
  cellCenter(ci){ const p = cellXY(ci); const r = boardCanvas.getBoundingClientRect();
    return { x: r.left + (p.x + p.w/2) * (r.width/boardCanvas.width), y: r.top + (p.y + p.h/2) * (r.height/boardCanvas.height) }; },
  // hit-test a client point → cell index (diagnostic: verifies the pointer→cell mapping under any render scale)
  _cellAtClient(cx, cy){ const l = toLocal(cx, cy); return cellAtPoint(l.x, l.y); },
  // true ON-SCREEN centre of a cell (accounts for the actual rendered scale, not the nominal /DPR)
  _cellVisualCenter(ci){ const p = cellXY(ci); const r = boardCanvas.getBoundingClientRect();
    return { x: r.left + (p.x + p.w/2) * (r.width/boardCanvas.width), y: r.top + (p.y + p.h/2) * (r.height/boardCanvas.height) }; },
  // peek at currently-animating tiles' per-edge bond progress (test hook for the move-flash fix)
  _movingEdges(){ const out = []; for (let ti=0; ti<State.tiles.length; ti++){ const a = State.tiles[ti] && State.tiles[ti].anim;
    if (a && a.edges) out.push({ home: ti, cell: State.cell.indexOf(ti), edges: a.edges }); } return out; },
  get _fxGlow(){ return State.fx ? State.fx.glow : 0; },   // test hook: current fuse-glow alpha (for parity capture)
  cfg: CFG,

  // ── GRAVITY-mode QA hooks (no-op-ish in single mode) ──
  mode: MODE,
  grav: GRAV,
  get clearedPics(){ return State.clearedPics; },
  get totalPics(){ return State.totalPics; },
  get busy(){ return State.busy; },
  // per-cell {picId,sub} map of the play grid (null where empty) — inspect the board
  gravBoard(){ return State.cell.map((ti) => ti==null ? null : ({ picId: State.tiles[ti].picId, sub: State.tiles[ti].sub })); },
  // per-column deck depths (number of face-down upcoming cards waiting)
  deckDepths(){ return (State.deck||[]).map((s)=>s.length); },
  totalDeckCards(){ return (State.deck||[]).reduce((n,s)=>n+s.length,0); },
  // number of EMPTY play cells right now
  emptyCells(){ let n=0; for (let ci=0; ci<State.N; ci++) if (State.cell[ci]==null) n++; return n; },
  // is there a completed 2×2 picture on the board right now?
  hasCompletePicture(){ return !!findCompletePicture(); },
  // test hooks: force a near-win state (empty deck + clearedPics) and inspect floating columns
  _emptyDeck(){ State.deck = Array.from({length: State.cols}, () => []); },
  _setCleared(n){ State.clearedPics = n; },
  _setReshuffle(b){ __reshuffleOn = !!b; },                 // tests turn OFF the deadlock auto-shuffle
  _solvable(){ return gravBoardSolvable(); },
  reshuffleCount(){ return __reshuffleCount; },             // QA: deadlock auto-reshuffles this stage
  _forceResolve(){ if (IS_GRAVITY){ State.phase='swapping'; gravityResolveAfterMove(); } },
  _floatingCols(){ const out=[]; for (let col=0; col<State.cols; col++){ let seenEmpty=false, floats=false;
    for (let r=State.rows-1; r>=0; r--){ const ti=State.cell[r*State.cols+col]; if (ti==null) seenEmpty=true; else if (seenEmpty) floats=true; }
    if (floats) out.push(col); } return out; },
  // find the 4 play cells holding picture `picId` (any positions), or null if not all on board
  gravCellsOfPic(picId){
    const out = [null,null,null,null];                  // index by sub 0..3
    for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti==null) continue;
      const t=State.tiles[ti]; if (t.picId===picId) out[t.sub]=ci; }
    return out.some(c=>c==null) ? null : out;
  },
  // DETERMINISTIC test driver: assemble picture `picId` into a 2×2 block at the lowest free
  // region by directly arranging cells, then run the real clear→gravity→feed resolve. Uses the
  // engine's resolve path (clear pop + glow + SFX, column gravity, deck feed, win-check).
  gravComplete(picId){
    if (!IS_GRAVITY || State.phase !== 'play' || State.busy) return false;
    const cells = this.gravCellsOfPic(picId);
    if (!cells) return false;                            // not all 4 tiles are on the board
    // choose a 2×2 target block: prefer one whose 4 cells currently hold ONLY tiles of this
    // picture (a clean in-place arrange); else use the bottom-left 2×2 and swap others out.
    const cols = State.cols, rows = State.rows;
    // pick the bottom-most, left-most 2×2 region as the target block
    const tlRow = rows-2, tlCol = 0;
    const tl = tlRow*cols+tlCol, tr=tl+1, bl=tl+cols, br=bl+1;
    const want = [tl,tr,bl,br];                          // target cells for sub 0,1,2,3
    // Permutation: each pic tile (slot at cells[sub]) → its want cell. Any NON-pic tile that
    // currently sits in a want cell is "displaced" into a freed pic-tile cell. Built atomically
    // from a snapshot so overlapping source/target cells can't corrupt each other.
    const before = State.cell.slice();
    const picTileSlots = new Set(cells.map((c)=>before[c]));  // the 4 TILE-slot indices of this picture
    const result = before.slice();
    // 1) place pic tiles into their want cells
    for (let k=0;k<4;k++) result[want[k]] = before[cells[k]];
    // 2) freed cells = pic-tile cells NOT used as a want cell; displaced tiles = the tiles in
    //    want cells that are NOT one of OUR pic tiles. Match them 1:1 into the freed cells.
    const wantSet = new Set(want);
    const freed = cells.filter((c)=>!wantSet.has(c));
    const displaced = want.filter((c)=>!picTileSlots.has(before[c]));   // non-pic occupants of want cells
    displaced.forEach((c, i) => { result[freed[i]] = before[c]; });
    State.cell = result;
    syncBondProgress();
    State.busy = true; State.phase = 'swapping';
    drawBoard();
    gravityResolveAfterMove();
    return true;
  },
  // TEST: arrange `picId` into a completed 2×2 but DELIBERATELY do NOT resolve — leaves a stuck
  // completed picture in 'play' phase (reproduces the last-picture freeze bug). The gravity WATCHDOG
  // must then auto-resolve it. Used by _repro_gravity_win.mjs to verify the fix.
  _stuckCompleteForTest(picId){
    if (!IS_GRAVITY) return false;
    const cells = this.gravCellsOfPic(picId); if (!cells) return false;
    const cols = State.cols, rows = State.rows;
    const tl = (rows-2)*cols, want = [tl, tl+1, tl+cols, tl+cols+1];
    const before = State.cell.slice();
    const picTileSlots = new Set(cells.map((c)=>before[c]));
    const result = before.slice();
    for (let k=0;k<4;k++) result[want[k]] = before[cells[k]];
    const wantSet = new Set(want);
    const freed = cells.filter((c)=>!wantSet.has(c));
    const displaced = want.filter((c)=>!picTileSlots.has(before[c]));
    displaced.forEach((c, i) => { result[freed[i]] = before[c]; });
    State.cell = result; syncBondProgress();
    State.busy = false; State.phase = 'play';     // stuck: completed picture sits, NOT resolved
    drawBoard();
    return true;
  },

  // ── glow / pop inspection hooks (verify the fuse-emphasis fixes) ──
  // the live glow halo target: which cells are glowing right now (null when idle)
  _fx(){ return State.fx ? { cells: State.fx.cells.slice(), glow: State.fx.glow, scale: State.fx.scale } : null; },
  // cells currently ENLARGED (anim.pivot set → the popped block), with their scale
  _popCells(){ const out=[]; for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti==null) continue;
    const a=State.tiles[ti].anim; if (a && a.pivot && a.scale!=null) out.push({ cell: ci, scale: +a.scale.toFixed(3) }); } return out; },
  // cells deferred to the TOP draw pass right now (grabbed/moved block via anim.top, or enlarged via anim.pivot)
  _topCells(){ const out=[]; for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti==null) continue;
    const a=State.tiles[ti].anim; if (a && (a.pivot || a.top)) out.push(ci); } return out; },
  // largest tile scale on the board right now (1 = no zoom) — to count zoom pulses over time
  _maxScale(){ let s=1; for (const t of State.tiles){ const a=t&&t.anim; if (a&&a.scale>s) s=a.scale; } return +s.toFixed(3); },
  // tile index holding (picId,sub), or -1
  _findTile(picId, sub){ for (let i=0;i<State.tiles.length;i++){ const t=State.tiles[i]; if (t&&t.picId===picId&&t.sub===sub) return i; } return -1; },
  // directly set the play grid to a tile-index permutation (test arrangement only)
  _setCells(arr){ State.anims.length=0; State.fx=null; for (const t of State.tiles){ if (t) t.anim=null; }
    State.cell = arr.slice(); syncBondProgress(); State.phase='play'; State.busy=false; drawBoard(); },
  // distinct picIds present on the board
  _picIds(){ const s=new Set(); for (const t of State.tiles){ if (t) s.add(t.picId); } return [...s].sort((a,b)=>a-b); },
  get boardW(){ return State.boardW; }, get boardH(){ return State.boardH; }, get deckOffY(){ return State.deckOffY; },
  get pad(){ return State.pad; }, get canvasW(){ return boardCanvas.width; }, get canvasH(){ return boardCanvas.height; },
  get fxOffX(){ return State.fxOffX; }, get fxOffY(){ return State.fxOffY; },
  // completion-converge geometry (warp check): tile size/gap/converge progress each frame
  get tileW(){ return State.tileW; }, get tileH(){ return State.tileH; },
  get gap(){ return State.gap; }, get gridConverge(){ return State.gridConverge; },
  // fuse-emphasis enlarge counter (double-zoom fix): how many emphasis pops fired since reset
  _emph(){ return __dbgEmph; }, _resetEmph(){ __dbgEmph = 0; },
  _cellRect(ci){ return cellXY(ci); },
};
</script>
