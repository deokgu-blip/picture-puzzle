  const sepEmph = (emphSet && !grabbedEmph) ? emphasisCells : null;       // displaced block that fused
  const sepEmphSet = sepEmph ? new Set(sepEmph) : null;
  // map each destination cell → its move's translation. Neighbors that move by the SAME
  // translation (a rigid group — grabbed OR a displaced whole group) stay relatively in place,
  // so their already-bonded internal seam must render SEAMLESS THROUGHOUT the move (no split-and-
  // remerge flash). Only genuinely NEW external bonds stay at 0 here and animate later (playMerge).
  const destTrans = {};
  for (const m of moves){
    destTrans[m.toCell] = (m.toCell % cols - m.fromCell % cols) + ',' + ((m.toCell / cols | 0) - (m.fromCell / cols | 0));
  }
  function movingEdges(dc){
    const col = dc % cols, row = dc / cols | 0, tr = destTrans[dc], e = { l:0, r:0, t:0, b:0 };
    if (col < cols-1       && destTrans[dc+1]    === tr && bondedRight(dc, dc+1))    e.r = 1;
    if (col > 0            && destTrans[dc-1]    === tr && bondedRight(dc-1, dc))    e.l = 1;
    if (row < State.rows-1 && destTrans[dc+cols] === tr && bondedBelow(dc, dc+cols)) e.b = 1;
    if (row > 0            && destTrans[dc-cols] === tr && bondedBelow(dc-cols, dc)) e.t = 1;
    return e;
  }
  const groupMoves = moves.filter((m) => groupSet.has(m.fromCell));
  // displaced pieces landing INTO the fused (displaced) block bounce as one emphasis group, not
  // individually — so the glow halo wraps the whole merged block, not a lone tile.
  const sepEmphMoves = sepEmphSet ? moves.filter((m) => !groupSet.has(m.fromCell) && sepEmphSet.has(m.toCell)) : [];
  const plainDisplaced = moves.length - groupMoves.length - sepEmphMoves.length;
  let settleLeft = plainDisplaced + (sepEmphMoves.length ? 1 : 0) + (groupMoves.length ? 1 : 0); // plain bounces + group + sep-emph
  let groupTweensLeft = groupMoves.length;
  let sepTweensLeft = sepEmphMoves.length;
  const done = () => { if (--settleLeft <= 0){ State.phase = 'play'; onDone && onDone(); } };

  // BUG FIX (gravity last-picture freeze): if EVERY move filtered out (all null-tile — a swap into
  // empty cells when the deck is dry, common when completing the FINAL picture), there are no tweens
  // to drive `done()`, so onDone would NEVER fire → the completed 2×2 sits unresolved → no stage end.
  // Resolve immediately in that case.
  if (settleLeft <= 0){ State.phase = 'play'; onDone && onDone(); return; }

  for (const m of moves){
    const tile = State.tiles[m.ti];
    const from = m.fromXY || cellXY(m.fromCell);
    const to = cellXY(m.toCell);
    const isGroup = groupSet.has(m.fromCell);
    const isSepEmph = !isGroup && sepEmphSet && sepEmphSet.has(m.toCell);
    const edges = movingEdges(m.toCell);
    // internal seams of any rigidly co-moving group stay bonded (=1) during the tween; new bonds = 0.
    // top:isGroup → the GRABBED (moved) block always draws ABOVE the displaced cards during the
    // swap, so a card whose slot is being swapped never passes OVER the one the player moved (user req).
    tile.anim = { x: from.x, y: from.y, scale:1, shadow:false, edges, top: isGroup };
    State.anims.push({
      update(t){
        const k = clamp01((t - t0) / CFG.SWAP_DUR);
        const e = easeInOut(k);
        tile.anim.x = lerp(from.x, to.x, e);
        tile.anim.y = lerp(from.y, to.y, e);
        return k >= 1;
      },
      finish(){
        if (isGroup){
          tile.anim = { x: to.x, y: to.y, scale:1, shadow:false, edges, top:true };   // stay on top until the bounce (pivot) takes over
          if (--groupTweensLeft <= 0) bounceGroup(bounceCells, grabbedEmph, done);
        } else if (isSepEmph){
          tile.anim = { x: to.x, y: to.y, scale:1, shadow:false, edges };   // hold; await the unified fuse-emphasis bounce
          if (--sepTweensLeft <= 0) bounceGroup(sepEmph, true, done);        // glow the block that ACTUALLY fused
        } else {
          bounce(m.ti, to, done);                                           // displaced piece settles on its own
        }
      }
    });
  }
  // DROP = no buzz in the jigsaw/swap mode (user req 2026-06-30): pick-up=soft, drop=none, merge=light.
  // The MERGE buzz fires separately in resolveMove (haptic('light') when a new bond forms) and is no
  // longer throttled out by this per-move buzz. Gravity mode keeps its move buzz (its own feel).
  if (IS_GRAVITY) haptic('light');
  ensureLoop();
}

let __dbgEmph = 0;   // test counter: how many fuse-emphasis enlarges have fired (verifies no double-zoom)
// Unified bounce of a fused block: every tile scales TOGETHER about the block's centre (so a
// 1×3 / 2×2 group bounces as one, not per-piece). On a fuse (emphasis) the pop is bigger and a
// brief white glow flashes over the block to show which pieces just merged.
function bounceGroup(cells, emphasis, onDone){
  if (!cells || !cells.length){ onDone && onDone(); return; }
  if (emphasis) __dbgEmph++;
  let gx = 0, gy = 0;
  for (const c of cells){ const p = cellXY(c); gx += p.x + p.w/2; gy += p.y + p.h/2; }
  const pivot = { x: gx / cells.length, y: gy / cells.length };   // enlarge about the TRUE centre (grow in place)
  // ENLARGE only on a real merge (emphasis). A plain move of an already-fused block does NOT
  // enlarge/glow — it just settles in place (user: glow+확대 only on the first merge).
  // Pop kept SMALL (user req: reduce the merge enlarge across all modes) — gentle, not a big jump.
  const over = emphasis ? CFG.BOUNCE_OVER * 0.5 : 0;       // peak ≈ ×1.065 (reduced again, user req)
  const dur = emphasis ? 300 : CFG.BOUNCE_DUR;             // a touch longer so the lift + outline glow reads
  const t0 = now();
  // PERF: create the fx object ONCE and mutate glow/scale per frame (don't recreate it) so the baked
  // glow sprite (fx._glowC, built lazily on first draw) survives the whole bounce instead of being
  // discarded + re-shadow-blurred every frame.
  const fx = emphasis ? { cells, glow: 0, scale: 1, pivot, _glowC: null } : null;
  if (fx) State.fx = fx;
  State.anims.push({
    update(t){
      const k = clamp01((t - t0) / dur);
      const s = 1 + Math.sin(k * Math.PI) * over;
      for (const c of cells){ const ti = State.cell[c]; if (ti == null) continue;
        const p = cellXY(c);
        State.tiles[ti].anim = { x: p.x, y: p.y, scale: s, pivot, shadow:false };   // pivot → drawn ON TOP; edges live
      }
      if (fx){ fx.glow = Math.sin(k * Math.PI); fx.scale = s; }   // white outline-glow halo (sprite blitted)
      return k >= 1;
    },
    finish(){ for (const c of cells){ const ti = State.cell[c]; if (ti != null) State.tiles[ti].anim = null; } State.fx = null; onDone && onDone(); }
  });
  ensureLoop();
}

// MERGE animation: for each newly-formed seam (in `newSeams` = {H:[ci…], V:[ci…]}),
// drive its per-edge bond progress 0→1 over MERGE_DUR (ease-out). Already-bonded seams
// are pinned to 1 immediately; this only animates the seams that just formed.
function playMerge(newSeams){
  const t0 = now();
  const items = [];
  for (const ci of newSeams.H){ State.bondH[ci] = 0; items.push(['H', ci]); }
  for (const ci of newSeams.V){ State.bondV[ci] = 0; items.push(['V', ci]); }
  if (!items.length) return;
  State.anims.push({
    update(t){
      const k = clamp01((t - t0) / CFG.MERGE_DUR);
      const e = easeOut(k);
      for (const [ax, ci] of items){ if (ax==='H') State.bondH[ci] = e; else State.bondV[ci] = e; }
      return k >= 1;
    },
    finish(){ for (const [ax, ci] of items){ if (ax==='H') State.bondH[ci] = 1; else State.bondV[ci] = 1; } }
  });
  ensureLoop();
}

// Sync the per-edge bond-progress arrays to the CURRENT board: every bonded seam → 1,
// every non-bonded seam → 0. Call after a resolve (then playMerge re-zeros the NEW ones
// so they animate up). Keeps existing fused groups seamless across moves.
function syncBondProgress(){
  const s = computeBondSeams();
  for (let ci=0; ci<State.N; ci++){
    State.bondH[ci] = s.H.has(ci) ? 1 : 0;
    State.bondV[ci] = s.V.has(ci) ? 1 : 0;
  }
  return s;
}

// settle bounce: scale 1 → 1+over → 1 (overshoot), tile pinned at its cell.
// edges:null lets drawBoard compute live per-edge bond progress (so the merge that
// runs concurrently is reflected as the tile lands).
function bounce(ti, at, onDone){
  const tile = State.tiles[ti];
  const t0 = now();
  tile.anim = { x: at.x, y: at.y, scale: 1, shadow:false, edges:null };
  State.anims.push({
    update(t){
      const k = clamp01((t - t0) / CFG.BOUNCE_DUR);
      tile.anim.scale = 1 + Math.sin(k * Math.PI) * CFG.BOUNCE_OVER;
      return k >= 1;
    },
    finish(){ tile.anim = null; onDone && onDone(); }
  });
  ensureLoop();
}

// return-to-origin for a whole GROUP (dropped where it started / out of bounds).
// `group` = cells, `liftDX/DY` = the pixel offset the lifted block was floating at.
function returnGroup(group, liftDX, liftDY, onDone){
  State.phase = 'swapping';
  let remaining = group.length;
  const t0 = now();
  for (const ci of group){
    const ti = State.cell[ci];
    const tile = State.tiles[ti];
    const p = cellXY(ci);
    const from = { x: p.x + liftDX, y: p.y + liftDY };
    tile.anim = { x: from.x, y: from.y, scale: CFG.PICK_SCALE, shadow:true, edges:null };
    State.anims.push({
      update(t){
        const k = clamp01((t - t0) / CFG.RETURN_DUR);
        const e = easeOut(k);
        tile.anim.x = lerp(from.x, p.x, e);
        tile.anim.y = lerp(from.y, p.y, e);
        tile.anim.scale = lerp(CFG.PICK_SCALE, 1, e);
        tile.anim.shadow = k < 0.9;
        return k >= 1;
      },
      finish(){ tile.anim = null; if (--remaining === 0){ State.phase='play'; onDone && onDone(); } }
    });
  }
  ensureLoop();
}

// ════════════════════════════════════════════════════════════════════════════
// RESOLVE A MOVE — the full FUSE path: grab group at originCell, block-swap so the
// grabbed piece lands on targetCell (clamped in-bounds), recompute bonds, animate,
// merge newly-formed seams, fire praise only if a NEW bond formed.
// `liftDX/liftDY` (optional) = the pixel offset the group was floating at, for a
// snap-back on a no-op drop. Returns true if a move was attempted.
// ════════════════════════════════════════════════════════════════════════════
function resolveMove(originCell, targetCell, liftDX, liftDY){
  liftDX = liftDX || 0; liftDY = liftDY || 0;
  const group = groupCellsOf(originCell);
  if (!group.length) return false;

  // displacement that lands the grabbed piece on the target cell
  let dcol = (targetCell % State.cols) - (originCell % State.cols);
  let drow = ((targetCell / State.cols)|0) - ((originCell / State.cols)|0);

  // CLAMP the whole group to stay in-bounds: shift the drop so no piece leaves the grid
  let minCol = Infinity, maxCol = -Infinity, minRow = Infinity, maxRow = -Infinity;
  for (const ci of group){
    const c = ci % State.cols, r = (ci/State.cols)|0;
    if (c<minCol) minCol=c; if (c>maxCol) maxCol=c;
    if (r<minRow) minRow=r; if (r>maxRow) maxRow=r;
  }
  if (minCol+dcol < 0)               dcol = -minCol;
  if (maxCol+dcol > State.cols-1)    dcol = State.cols-1-maxCol;
  if (minRow+drow < 0)               drow = -minRow;
  if (maxRow+drow > State.rows-1)    drow = State.rows-1-maxRow;

  // no-op: dropped where it started → snap the group back
  if (dcol === 0 && drow === 0){
    returnGroup(group, liftDX, liftDY, () => { drawBoard(); });
    return true;
  }

  // bonds BEFORE the move — as PIECE-PAIRS (so moving/displacing a fused group is NOT a "new bond")
  const beforePairs = computeBondPairs();

  // remember each piece's pre-move pixel pos (group pieces start lifted) so the tween
  // animates from where they visually are.
  const fromXY = {};
  for (const m of [].concat(group)){
    const p = cellXY(m); fromXY[m] = { x: p.x + liftDX, y: p.y + liftDY };
  }

  // commit the permutation
  const moves = applyBlockSwap(group, dcol, drow);
  tutOnMove();                                  // stage-1 onboarding: a REAL move advances the tutorial (never on a no-op)
  // tag each move's visual start: group pieces lifted (+lift offset), displaced pieces from rest
  const groupSet = new Set(group);
  for (const m of moves){ m.fromXY = groupSet.has(m.fromCell) ? fromXY[m.fromCell] : cellXY(m.fromCell); }

  // bonds AFTER → newly-formed seams = after \ before
  syncBondProgress();                         // existing bonds pinned to 1
  const afterSeams = computeBondSeams();
  const afterBondCount = afterSeams.H.size + afterSeams.V.size;
  // a seam is NEW only if its PIECE-PAIR wasn't bonded before (not just because it sits on a new cell)
  const newSeams = { H: [], V: [] };
  for (const ci of afterSeams.H) if (!beforePairs.has(pairKey(State.cell[ci], State.cell[ci+1])))          newSeams.H.push(ci);
  for (const ci of afterSeams.V) if (!beforePairs.has(pairKey(State.cell[ci], State.cell[ci+State.cols]))) newSeams.V.push(ci);
  const formedNewBond = newSeams.H.length + newSeams.V.length > 0;

  // the FINAL merged block to bounce as one unit = the connected component now containing the
  // grabbed pieces (grabbed group + anything it just fused to).
  const gcols = State.cols;
  const grabbedNewCell0 = ((group[0] / gcols | 0) + drow) * gcols + (group[0] % gcols + dcol);
  const bounceCells = groupCellsOf(grabbedNewCell0);

  // EMPHASIS (enlarge + glow) targets the component that ACTUALLY fused — NOT always the grabbed
  // piece. In a swap the *displaced* piece can be the one that bonds at its new spot (user bug:
  // glow showed on the dragged piece instead of the merged block). Find the fused component from
  // the new seams: the grabbed block if it fused, else the displaced block that did.
  let emphasisCells = null;
  if (formedNewBond){
    const newBondCells = [];
    for (const ci of newSeams.H){ newBondCells.push(ci, ci+1); }
    for (const ci of newSeams.V){ newBondCells.push(ci, ci+gcols); }
    const grabbedSet = new Set(bounceCells);
    const seed = newBondCells.find((c) => grabbedSet.has(c));            // grabbed fused → glow grabbed
    emphasisCells = groupCellsOf(seed != null ? seed : newBondCells[0]); // else glow the fused (displaced) block
    // SINGLE zoom on disappear: if this move immediately COMPLETES a picture (it pops+fades in
    // clearPicture), skip the merge-emphasis enlarge so the player sees ONE zoom (the clear), not
    // merge-zoom + clear-zoom back-to-back (user bug).
    if (IS_GRAVITY){
      const willClear = findCompletePicture();
      if (willClear){ const cs = new Set(willClear); if (emphasisCells.some((c) => cs.has(c))) emphasisCells = null; }
    }
  }

  // animate the block move; concurrently run the merge of any new seams
  animateMoves(moves, group, bounceCells, emphasisCells, () => {
    drawBoard();
    if (IS_GRAVITY) { gravityResolveAfterMove(); return; }   // detect completed 2×2 → clear → gravity → feed
    if (isComplete()) { onComplete(); return; }
  });
  if (formedNewBond){
    playMerge(newSeams);
    haptic('light');                           // MERGE = light buzz (user req 2026-06-30; grab=soft, drop=none)
    SFX.play('snap');                          // satisfying click the moment pieces fuse
    showPraise(afterBondCount / maxSeams());   // praise ONLY on a new bond; word by bonded fraction
  } else {
    SFX.play('place', 0.5);                    // softer "place" when no new bond formed
  }
  return true;
}

// ════════════════════════════════════════════════════════════════════════════
// COMPLETION
// ════════════════════════════════════════════════════════════════════════════
function isComplete(){
  if (IS_GRAVITY){
    // GRAVITY win = ALL pictures cleared (deck empty + board empty).
    if (State.clearedPics < State.totalPics) return false;
    for (let ci=0; ci<State.N; ci++) if (State.cell[ci] != null) return false;
    for (let col=0; col<State.cols; col++) if ((State.deck[col]||[]).length) return false;
    return true;
  }
  for (let ci=0; ci<State.N; ci++){
    const ti = State.cell[ci];
    if (ti == null || State.tiles[ti].home !== ci) return false;
  }
  return true;
}
// how many tiles currently sit in their correct (home) cell
function countCorrect(){
  let n = 0;
  for (let ci=0; ci<State.N; ci++){ const ti = State.cell[ci]; if (ti != null && State.tiles[ti].home === ci) n++; }
  return n;
}

// praise pop-text: word escalates with board completeness; pop-in → hold → fade+rise out
const praiseEl = document.getElementById('praise');
let praiseRaf = 0;
function showPraise(frac){
  const idx = Math.min(PRAISE.length - 1, Math.max(0, Math.floor(frac * PRAISE.length)));
  const p = PRAISE[idx];
  praiseEl.src = p.img; praiseEl.alt = p.word;
  const t0 = now(), IN = CFG.PRAISE_IN, HOLD = CFG.PRAISE_HOLD, OUT = CFG.PRAISE_OUT, total = IN+HOLD+OUT;
  if (praiseRaf) cancelAnimationFrame(praiseRaf);
  (function step(){
    const t = now() - t0; let scale, opacity, dy = 0;
    if (t < IN){ const e = easeOutBack(clamp01(t/IN)); scale = 0.4 + 0.6*e; opacity = clamp01((t/IN)*2); }
    else if (t < IN+HOLD){ scale = 1; opacity = 1; }
    else { const k = clamp01((t-IN-HOLD)/OUT); scale = 1 + 0.08*k; opacity = 1 - k; dy = -28*k; }
    praiseEl.style.transform = `translate(-50%, calc(-50% + ${dy}px)) scale(${scale})`;
    praiseEl.style.opacity = String(opacity);
    if (t < total) praiseRaf = requestAnimationFrame(step);
    else { praiseEl.style.opacity = '0'; praiseRaf = 0; }
  })();
}

function onComplete(){
  State.phase = 'complete';
  haptic('medium');
  SFX.play('complete');                 // celebratory chime, pairs with confetti + banner
  // GRAVITY: the board is already empty (all pictures cleared) → no whole-board converge;
  // go straight to the shared confetti + result ribbon.
  if (IS_GRAVITY){
    drawBoard();
    fireConfetti(); showBanner(); startMontage();   // looping thumbnails of the pictures cleared this stage
    if (GR.active && RT.shouldEmitGameEnd(State.level)) {
      setTimeout(() => { try { GR.gameEnd(true, State.level); } catch(e){} }, 600);
    }
    return;
  }
  // solved → the whole board is one group; pin every seam bonded so the converge
  // renders a single seamless photo (no internal seams left).
  syncBondProgress();
  // on completion the gap + corner radius + border converge to 0 (tiles slide flush) →
  // the photo seals into one seamless picture (CONVERGE_DUR), then confetti + banner.
  const t0 = now();
  State.anims.push({
    update(t){
      const k = clamp01((t - t0) / CFG.CONVERGE_DUR);
      State.gridConverge = easeInOut(k);
      const unit = Math.min(State.boardW / State.cols, State.boardH / State.rows);
      State.radius = Math.round(unit * CFG.RADIUS_FRAC * (1 - State.gridConverge));
      // proportional gaps → tileW/tileH holds the photo aspect the whole seal → NO warp (see setProportionalGaps)
      setProportionalGaps(unit * CFG.GAP_FRAC * (1 - State.gridConverge));
      return k >= 1;
    },
    finish(){ State.gridConverge = 1; fireConfetti(); showBanner(); }
  });
  ensureLoop();

  // gamereels: emit GameEnd(success, level) per policy
  if (GR.active && RT.shouldEmitGameEnd(State.level)) {
    setTimeout(() => { try { GR.gameEnd(true, State.level); } catch(e){} }, 600);
  }
}

// ════════════════════════════════════════════════════════════════════════════
// GRAVITY MODE — board build, complete-detect, clear, column gravity, deck feed.
// All of this is gated by IS_GRAVITY; single mode never enters here. Movement, the
// fuse-bond rendering/animation, drag, glow, SFX and the result screen are SHARED.
// ════════════════════════════════════════════════════════════════════════════

// find ONE completed picture: 4 tiles of the same picId forming a correct 2×2 cell block
// (TL at cell c with c+1=TR, c+cols=BL, c+cols+1=BR, each tile's sub matching its position),
// bonded together. Position-independent — scans every possible top-left play cell. Returns
// the 4 cells [TL,TR,BL,BR] or null.
function findCompletePicture(){
  const cols = State.cols, rows = State.rows;
  for (let r=0; r<rows-1; r++){
    for (let c=0; c<cols-1; c++){
      const tl = r*cols + c, tr = tl+1, bl = tl+cols, br = bl+1;
      const a = State.cell[tl], b = State.cell[tr], d = State.cell[bl], e = State.cell[br];
      if (a==null || b==null || d==null || e==null) continue;
      const A=State.tiles[a], B=State.tiles[b], D=State.tiles[d], E=State.tiles[e];
      const pid = A.picId;
      if (B.picId!==pid || D.picId!==pid || E.picId!==pid) continue;
      // sub positions must be exactly TL,TR,BL,BR (0,1,2,3)
      if (A.sub!==0 || B.sub!==1 || D.sub!==2 || E.sub!==3) continue;
      return [tl, tr, bl, br];
    }
  }
  return null;
}

// any column with a tile sitting ABOVE an empty cell (a "floating" piece that should drop)?
function hasFloating(){
  for (let col=0; col<State.cols; col++){
    let seenEmpty = false;
    for (let r=State.rows-1; r>=0; r--){
      const ti = State.cell[r*State.cols + col];
      if (ti == null) seenEmpty = true; else if (seenEmpty) return true;   // a tile above a gap
    }
  }
  return false;
}

// after a move settles: clear ALL completed pictures (one at a time), then gravity + feed, then
// re-check for cascades. If no picture completes, still SETTLE any floating pieces straight down
// (gravity, NO deck feed) so the board is always bottom-packed (no piece hanging over a gap — user
// req); then re-resolve (a settle can land a new 2×2). Finally win-check or hand back to play.
function gravityResolveAfterMove(){
  State.busy = true;
  const cells = findCompletePicture();
  if (cells){
    clearPicture(cells, () => { applyColumnGravity(() => { gravityResolveAfterMove(); }); });
  } else if (hasFloating()){
    applyColumnGravity(() => { gravityResolveAfterMove(); }, false);   // drop floaters (no feed), then re-check
  } else {
    State.busy = false;
    if (isComplete()) { onComplete(); return; }
    // ERROR-DEFENSE (user req): if NO face-up picture can be completed (deadlock), auto-shuffle.
    if (__reshuffleOn && !gravBoardSolvable()) { reshuffleGravity(); return; }
    State.phase = 'play';
    drawBoard();
  }
}

let __reshuffleOn = true;   // tests disable this (sparse test boards are intentionally "unsolvable")
let __reshuffleCount = 0;   // telemetry: how many deadlock auto-reshuffles happened this stage (QA)
// SOLVABLE iff some picture has ALL 4 of its sub-tiles face-up on the board — the player can always
// arrange 4 present subs into a 2×2. If none, it's a deadlock (the missing subs are face-down in the
// deck and can't feed without a clear) → reshuffleGravity re-deals.
function gravBoardSolvable(){
  const subs = {};
  for (let ci=0; ci<State.N; ci++){ const ti = State.cell[ci]; if (ti == null) continue;
    const t = State.tiles[ti]; (subs[t.picId] = subs[t.picId] || new Set()).add(t.sub); }
  for (const pid in subs) if (subs[pid].size === 4) return true;
  return false;
}
// does a candidate cell→tileIndex layout contain a complete 2×2 picture? (reject pre-completed reshuffles)
function gravCellHasComplete(cell, tiles){
  const cols = State.cols, rows = State.rows;
  for (let r=0; r<rows-1; r++) for (let c=0; c<cols-1; c++){
    const tl=cell[r*cols+c], tr=cell[r*cols+c+1], bl=cell[(r+1)*cols+c], br=cell[(r+1)*cols+c+1];
    if (tl==null||tr==null||bl==null||br==null) continue;
    const A=tiles[tl],B=tiles[tr],D=tiles[bl],E=tiles[br];
    if (A.picId===B.picId&&A.picId===D.picId&&A.picId===E.picId&&A.sub===0&&B.sub===1&&D.sub===2&&E.sub===3) return true;
  }
  return false;
}
// DEADLOCK RECOVERY: gather ALL remaining tiles (board + deck — pictures are atomic, 4 subs each),
// re-deal COMPLETE pictures onto the board (bottom-packed, scrambled, not pre-complete) with the rest
// back into the deck, then run the deal-in/reveal so the player sees a clean reshuffle.
function reshuffleGravity(onDone){
  State.busy = true; __reshuffleCount++;
  const rnd = () => Math.random();
  const shuffle = (a) => { for (let i=a.length-1;i>0;i--){ const j=(rnd()*(i+1))|0; const t=a[i]; a[i]=a[j]; a[j]=t; } return a; };
  // collect picIds of every remaining tile (board + deck)
  const picSet = new Set();
  for (let ci=0; ci<State.N; ci++){ const ti=State.cell[ci]; if (ti!=null) picSet.add(State.tiles[ti].picId); }
  for (let col=0; col<State.cols; col++) for (const c of (State.deck[col]||[])) picSet.add(c.picId);
  const pids = shuffle([...picSet]);
  const boardPicN = Math.min(Math.floor(State.N/4), pids.length);
  const boardPids = pids.slice(0, boardPicN), deckPids = pids.slice(boardPicN);

  // new board: complete pictures, bottom-packed per column, scrambled, reject pre-complete
  let tiles=null, cell=null;
  const cols=State.cols, rows=State.rows;
  for (let attempt=0; attempt<400; attempt++){
    const perm=[]; for (const pid of boardPids) for (let s=0;s<4;s++) perm.push({picId:pid, sub:s});
    shuffle(perm);
    const T = perm.map((p,i)=>({ home:i, picId:p.picId, sub:p.sub, faceUp:false, reveal:0, anim:null }));
    const C = new Array(State.N).fill(null);
    const per = Math.floor(perm.length/cols), extra = perm.length%cols;
    let idx=0;
    for (let cc=0; cc<cols; cc++){ const cnt = per + (cc<extra?1:0); for (let k=0;k<cnt;k++) C[(rows-1-k)*cols+cc] = idx++; }
    if (!gravCellHasComplete(C, T)) { tiles=T; cell=C; break; }
    if (attempt===399){ tiles=T; cell=C; }
  }
  State.tiles = tiles; State.cell = cell;
  // rebuild deck from the remaining pictures
  State.deck = Array.from({length: State.cols}, () => []);
  for (const pid of shuffle([...deckPids])){ const sc=shuffle([0,1,2,3]); for (let c=0;c<State.cols;c++) State.deck[c].push({ picId:pid, sub:sc[c], tileIdx:-1 }); }

  State.bondH = new Array(State.N).fill(0); State.bondV = new Array(State.N).fill(0);
  layout(); State.cardBack = buildCardBack(State.tileW, State.tileH); invalidateStaticCache(); syncBondProgress(); drawBoard();
  dealIn(() => { reveal(() => { State.phase = 'play'; State.busy = false; onDone && onDone(); }); });
}

// CLEAR a completed picture: a brief pop+fade with the shared fuse outline-glow + a clear
// SFX (snap/complete), then its 4 cells become empty. Reuses State.fx for the glow halo.
function clearPicture(cells, onDone){
  State.clearedPics++;
  // record which picture this was (read BEFORE the cells get nulled) → result-screen montage
  { const ti0 = State.cell[cells[0]]; const t0c = ti0!=null ? State.tiles[ti0] : null;
    if (t0c) State.clearedList.push(t0c.picId); }
  haptic('medium');
  SFX.play('snap'); SFX.play('complete', 0.5);
  // pivot = block centre, so the pop scales the 2×2 as one unit
  let gx=0, gy=0; for (const c of cells){ const p=cellXY(c); gx+=p.x+p.w/2; gy+=p.y+p.h/2; }
  // pop about the TRUE block centre — it grows in place and may spill past the grid into the
  // canvas headroom (State.pad), so an edge picture is NOT clipped (and NOT shoved inward).
  const pivot = { x: gx/cells.length, y: gy/cells.length };
  const t0 = now(), dur = GRAV.CLEAR_POP;
  State.anims.push({
    update(t){
      const k = clamp01((t - t0) / dur);
      const s = 1 + Math.sin(Math.min(k,0.5)*Math.PI) * 0.07;   // quick pop up (reduced again — user req)
      const fade = 1 - clamp01((k - 0.45) / 0.55);              // then fade out
      for (const c of cells){ const ti = State.cell[c]; if (ti==null) continue;
        const p = cellXY(c);
        State.tiles[ti].anim = { x:p.x, y:p.y, scale:s, pivot, shadow:false, faceAlpha:fade, backAlpha:0,
          edges:{ l: cells.includes(c-1)?1:0, r: cells.includes(c+1)?1:0, t: cells.includes(c-State.cols)?1:0, b: cells.includes(c+State.cols)?1:0 } };
      }
      State.fx = { cells, glow: Math.sin(Math.min(k,0.5)*Math.PI), scale: s, pivot };  // shared outline-glow
      return k >= 1;
    },
    finish(){
      for (const c of cells){ const ti = State.cell[c]; if (ti!=null) State.tiles[ti].anim = null; State.cell[c] = null; }
      State.fx = null; drawBoard(); onDone && onDone();
    }
  });
  ensureLoop();
}

// COLUMN GRAVITY: in each column, tiles above empties fall straight down to rest on the
// stack/floor (animated). Then deck cards fall into the empties opened at the TOP of the
// column and FLIP face-up as they enter play. Animates both; calls onDone when settled.
// pop the next deck card for `col`: prefer that column's own pile; if empty, borrow from the
// column with the most remaining cards (keeps the deck globally balanced → every empty fills).
function nextDeckCard(col){
  if (State.deck[col] && State.deck[col].length) return State.deck[col].pop();
  let best = -1, bestN = 0;
  for (let c=0; c<State.cols; c++){ const n = (State.deck[c]||[]).length; if (n > bestN){ bestN = n; best = c; } }
  return best >= 0 ? State.deck[best].pop() : null;
}
function applyColumnGravity(onDone, doFeed){
  if (doFeed === undefined) doFeed = true;   // clears refill from the deck; a post-move settle does NOT
  const cols = State.cols, rows = State.rows;
  const moves = [];          // {ti, fromRow, toRow, col}
  const feeds = [];          // {card, col, toRow, fromDeckY} — deck cards entering play

  for (let col=0; col<cols; col++){
    // collect existing tiles in this column, top→bottom
    const colTiles = [];
    for (let r=0; r<rows; r++){ const ti = State.cell[r*cols+col]; if (ti!=null) colTiles.push({ ti, fromRow:r }); }
    // they settle to the BOTTOM of the column (floor), preserving order
    const settledCount = colTiles.length;
    const baseRow = rows - settledCount;
    // assign bottom rows to existing tiles
    for (let i=0;i<colTiles.length;i++){
      const toRow = baseRow + i;
      if (colTiles[i].fromRow !== toRow) moves.push({ ti: colTiles[i].ti, fromRow: colTiles[i].fromRow, toRow, col });
    }
    // empties remaining at the TOP (rows 0..baseRow-1) get filled from the deck (stack end = next).
    // fill from the bottom-most empty upward. Pull from THIS column's deck first; if it's dry but
    // empties remain, BORROW from the fullest column's deck (global balance) so no empty is ever
    // left stuck while deck cards exist elsewhere (else some pictures could never complete → no win).
    if (doFeed) for (let fillRow = baseRow - 1; fillRow >= 0; fillRow--){
      const card = nextDeckCard(col);
      if (!card) break;
      feeds.push({ card, col, toRow: fillRow });
    }
    // rebuild the cell column from settled + (filled empties handled below)
  }

  // commit the falls + feeds into State.cell / State.tiles
  // 1) clear the whole grid first (we recompute positions)
  // build a fresh column layout: settled tiles at bottom, fed cards above them in fill order
  const newCell = new Array(State.N).fill(null);
  for (let col=0; col<cols; col++){
    const colTiles = [];
    for (let r=0; r<rows; r++){ const ti = State.cell[r*cols+col]; if (ti!=null) colTiles.push(ti); }
    const settledCount = colTiles.length;
    const baseRow = rows - settledCount;
    for (let i=0;i<colTiles.length;i++) newCell[(baseRow+i)*cols + col] = colTiles[i];
  }
  // place fed cards: assign each a fresh tiles[] slot, mark face-down (will flip on entry)
  for (const f of feeds){
    const ti = State.tiles.length;
    State.tiles.push({ home: ti, picId: f.card.picId, sub: f.card.sub, faceUp:false, reveal:0, anim:null });
    f.tileIdx = ti;
    newCell[f.toRow*cols + f.col] = ti;
  }
  State.cell = newCell;
  syncBondProgress();          // recompute bonds for the settled board (incidental adjacencies)

  // animate: existing tiles fall (ease-in), fed cards descend from the deck + flip face-up.
  const t0 = now();
  let pending = 0;
  // existing-tile falls
  for (const m of moves){
    pending++;
    const tile = State.tiles[m.ti];
    const fromP = { x: cellXY(m.toRow*cols+m.col).x, y: cellXY(m.fromRow*cols+m.col).y };   // padded (matches the grid)
    const toP = cellXY(m.toRow*cols + m.col);
    tile.anim = { x: fromP.x, y: fromP.y, scale:1, shadow:false, edges:null, faceAlpha: tile.faceUp?1:0, backAlpha: tile.faceUp?0:1 };
    State.anims.push({
      update(t){ const k = clamp01((t-t0)/GRAV.GRAVITY_DUR); const e = k*k; // ease-in (accelerate, like falling)
        tile.anim.y = lerp(fromP.y, toP.y, e); return k>=1; },
      finish(){ tile.anim = null; haptic('light'); if (--pending<=0) settle(); }   // LAND: piece hit the floor / another piece (user req)
    });
  }
  // deck-card feeds: descend from their deck slot into play, flipping face-up
  for (const f of feeds){
    pending++;
    const tile = State.tiles[f.tileIdx];
    const toP = cellXY(f.toRow*cols + f.col);
    // start just above the play area (at the deck's lowest row), so it visibly drops in
    const fromY = (State.pad||0) + Math.round((GRAV.DECK_ROWS-1)*(State.tileH+State.gap));
    tile.anim = { x: toP.x, y: fromY, scale:1, scaleX:1, shadow:false, edges:{l:0,r:0,t:0,b:0}, backAlpha:1, faceAlpha:0 };
    State.anims.push({
      update(t){
        const k = clamp01((t-t0)/GRAV.FEED_DUR); const e = k*k;
        tile.anim.y = lerp(fromY, toP.y, e);
        // flip reveal over the second half of the descent (back→face)
        const fk = clamp01((k - 0.35) / 0.65);
        const half = fk < 0.5;
        tile.anim.scaleX = Math.abs(Math.cos(fk*Math.PI));
        tile.anim.backAlpha = half ? 1 : 0;
        tile.anim.faceAlpha = half ? 0 : 1;
        tile.reveal = half ? 0 : 1;
        if (k>=1){ tile.faceUp = true; tile.reveal = 1; }
        return k>=1;
      },
      finish(){ tile.anim = null; tile.faceUp = true; tile.reveal = 1; haptic('selection'); if (--pending<=0) settle(); }   // LAND: dealt-in deck card settles (user req)
    });
  }
  // (landing haptics now fire per-piece in the finish() callbacks above — was a single buzz at fall-start)
  function settle(){ syncBondProgress(); drawBoard(); onDone && onDone(); }
  if (pending === 0){ settle(); return; }
  ensureLoop();
}

function showBanner(){
  overlay.style.display = 'flex';
  { const hud = document.getElementById('hud-top'); if (hud) hud.style.opacity = '0'; }   // clean result screen (hide Stage label/hint)
  if (!IS_GRAVITY) boardCanvas.classList.add('complete');     // single-mode: photo shrinks into the white frame
  const t0 = now();
  banner.style.transform = 'translateY(-44px) scale(.7)'; banner.style.opacity = '0';
  function step(){
    const k = clamp01((now() - t0) / CFG.BANNER_DUR);
    const e = easeOutBack(k);
    banner.style.transform = 'translateY(' + lerp(-44,0,e) + 'px) scale(' + (0.7 + 0.3*e) + ')';
    banner.style.opacity = String(clamp01(k*2));
    if (k < 1) requestAnimationFrame(step);
    else { showReward(); setTimeout(showNext, CFG.NEXT_DELAY); }
  }
  requestAnimationFrame(step);
}
function showReward(){

  // held-coin HUD (top-right) with the new total. Reels build keeps the static "+50" + no HUD.

  const t0 = now();
  function step(){
